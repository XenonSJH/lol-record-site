<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script>
(function(){
  if(window.innerWidth>768) window.location.replace('/');
})();
</script>
<title>BANDLE.GG Mobile</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%237c3aed"/><text x="32" y="27" font-size="20" font-family="Arial" font-weight="900" fill="white" text-anchor="middle">BD</text><text x="32" y="50" font-size="20" font-family="Arial" font-weight="900" fill="white" text-anchor="middle">GG</text></svg>'>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#08111f;--panel:#111827;--card:#172033;--line:#2b3a55;--text:#f8fafc;--sub:#9fb0c7;--violet:#8b5cf6;--blue:#60a5fa;--red:#fb7185;--green:#4ade80;--gold:#facc15}
*{box-sizing:border-box}
html,body{margin:0;width:100%;min-height:100%;background:var(--bg);color:var(--text);font-family:Segoe UI,Apple SD Gothic Neo,Malgun Gothic,sans-serif}
body{padding:env(safe-area-inset-top) 0 calc(74px + env(safe-area-inset-bottom));overflow:hidden}
button,input,select{font:inherit}
.app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--line);background:rgba(8,17,31,.96);backdrop-filter:blur(12px);flex-shrink:0}
.brand{display:flex;align-items:center;gap:9px;font-weight:1000;font-size:18px}
.mark{width:34px;height:34px;border-radius:11px;background:linear-gradient(135deg,var(--violet),#4c1d95);display:grid;place-items:center;font-size:12px;line-height:12px;border:1px solid #a78bfa}
.top-actions{display:flex;gap:8px}
.icon-btn{width:38px;height:38px;border-radius:12px;border:1px solid var(--line);background:#0f172a;color:white;font-weight:1000}
.view{flex:1;overflow:auto;padding:14px 12px 18px}
.page{display:none}.page.active{display:block}
.hero{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:14px}
.metric{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;min-height:86px}
.metric-label{color:var(--sub);font-size:12px;font-weight:900}.metric-value{font-size:26px;font-weight:1000;margin-top:8px}.metric-sub{color:var(--sub);font-size:12px;font-weight:800;margin-top:4px}
.section-title{font-size:18px;font-weight:1000;margin:18px 2px 10px}
.stack{display:flex;flex-direction:column;gap:10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px;min-width:0}
.row{display:flex;align-items:center;gap:11px;min-width:0}
.avatar,.champ{width:52px;height:52px;border-radius:14px;background:#334155;object-fit:cover;border:1px solid #475569;display:grid;place-items:center;color:#cbd5e1;font-weight:1000;flex-shrink:0}
.avatar.round{border-radius:50%}.champ.small{width:36px;height:36px;border-radius:10px}
.main{min-width:0;flex:1}.name{font-size:17px;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sub{font-size:12px;color:var(--sub);font-weight:800;margin-top:4px;line-height:1.35}
.rank{width:32px;text-align:center;font-size:18px;font-weight:1000;color:#ede9fe;flex-shrink:0}.pill{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;padding:5px 8px;font-size:12px;font-weight:1000;background:#0f172a;color:#e2e8f0}
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;margin-top:10px}.stat{background:#0f172a;border:1px solid var(--line);border-radius:12px;padding:8px;text-align:center}.stat b{display:block;font-size:14px}.stat span{display:block;color:var(--sub);font-size:11px;font-weight:800;margin-top:2px}
.toolbar{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:12px;position:sticky;top:-14px;background:linear-gradient(var(--bg) 82%,rgba(8,17,31,0));padding:12px 0 10px;z-index:3}
.search{width:100%;border:1px solid var(--line);background:#0f172a;color:white;border-radius:13px;padding:11px 12px;outline:none;min-width:0}.search:focus{border-color:var(--violet)}
.select{border:1px solid var(--line);background:#0f172a;color:white;border-radius:13px;padding:0 9px;font-weight:900}
.tabs{position:fixed;left:0;right:0;bottom:0;height:calc(66px + env(safe-area-inset-bottom));padding:8px 8px env(safe-area-inset-bottom);background:rgba(8,17,31,.98);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);gap:6px;z-index:20}
.tab{border:0;border-radius:14px;background:transparent;color:#cbd5e1;font-size:11px;font-weight:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}.tab.active{background:var(--violet);color:white}.tab i{font-style:normal;font-size:17px}
.match-card{padding:0;overflow:hidden}.match-head{display:flex;align-items:center;justify-content:space-between;padding:13px;border-bottom:1px solid var(--line)}.match-code{font-size:15px;font-weight:1000}.score{font-size:17px;font-weight:1000}.blue{color:var(--blue)}.red{color:var(--red)}.comps{display:flex;flex-direction:column;padding:8px;gap:7px}.comp{display:grid;grid-template-columns:minmax(0,1fr) 38px minmax(0,1fr);align-items:center;gap:6px;background:#0f172a;border:1px solid var(--line);border-radius:12px;padding:7px}.side{display:flex;align-items:center;gap:6px;min-width:0}.side.redside{justify-content:flex-end;text-align:right}.lane{font-size:11px;font-weight:1000;color:#e2e8f0;text-align:center}.ctext{min-width:0}.cname{font-size:12px;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pname{font-size:11px;color:var(--sub);font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mvp{display:inline-flex;vertical-align:middle;margin-right:4px;background:linear-gradient(135deg,var(--gold),#f97316);color:#111827;border-radius:999px;padding:1px 5px;font-size:9px;font-weight:1000}
.detail{position:fixed;inset:0;background:var(--bg);z-index:30;display:none;flex-direction:column}.detail.show{display:flex}.detail-head{height:58px;display:flex;align-items:center;gap:10px;padding:0 12px;border-bottom:1px solid var(--line);flex-shrink:0}.detail-title{font-weight:1000;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.detail-body{overflow:auto;padding:14px 12px 86px}.back{width:38px;height:38px;border-radius:12px;border:1px solid var(--line);background:#0f172a;color:white;font-size:18px}
.team{display:flex;flex-direction:column;gap:8px}.record{display:grid;grid-template-columns:40px minmax(0,1fr) auto;gap:8px;align-items:center;background:#0f172a;border:1px solid var(--line);border-radius:12px;padding:8px}.kda{font-size:12px;font-weight:1000;color:#e2e8f0}.win{color:var(--green)}.lose{color:var(--red)}
.account-grid{display:flex;flex-direction:column;gap:12px}.form{display:flex;flex-direction:column;gap:9px}.btn{border:0;border-radius:13px;background:var(--violet);color:white;padding:12px;font-weight:1000}.ghost{background:#0f172a;border:1px solid var(--line)}.msg{color:var(--sub);font-size:12px;font-weight:800;min-height:18px}.empty,.loading{border:1px dashed #475569;border-radius:16px;padding:24px;text-align:center;color:var(--sub);font-weight:900}
@media(max-width:380px){.hero{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.name{font-size:16px}.avatar,.champ{width:48px;height:48px}.tabs{gap:3px}.tab{font-size:10px}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><div class="mark">BD<br>GG</div><span>BANDLE.GG</span></div>
    <div class="top-actions"><button class="icon-btn" onclick="refresh()">↻</button></div>
  </header>
  <main class="view">
    <section id="home" class="page active">
      <div class="hero">
        <div class="metric"><div class="metric-label">플레이어</div><div class="metric-value" id="mPlayers">-</div></div>
        <div class="metric"><div class="metric-label">총 경기</div><div class="metric-value" id="mMatches">-</div></div>
        <div class="metric"><div class="metric-label">이번주 경기</div><div class="metric-value" id="mWeek">-</div></div>
        <div class="metric"><div class="metric-label">시즌</div><div class="metric-value" id="mSeason">-</div><div class="metric-sub" id="mSeasonSub"></div></div>
      </div>
      <div class="section-title">TOP 플레이어</div>
      <div id="homeTop" class="stack"><div class="loading">불러오는 중...</div></div>
      <div class="section-title">최근 내전</div>
      <div id="homeMatches" class="stack"></div>
    </section>
    <section id="players" class="page">
      <div class="toolbar"><input id="playerSearch" class="search" placeholder="플레이어 검색" oninput="renderPlayers()"><select id="playerSort" class="select" onchange="renderPlayers()"><option value="lp">LP</option><option value="winrate">승률</option><option value="games">판수</option><option value="wins">승수</option></select></div>
      <div id="playersList" class="stack"></div>
    </section>
    <section id="champions" class="page">
      <div class="toolbar"><input id="champSearch" class="search" placeholder="챔피언 검색" oninput="renderChampions()"><select id="champLane" class="select" onchange="renderChampions()"><option>ALL</option><option>TOP</option><option>JUG</option><option>MID</option><option>ADC</option><option>SUP</option></select></div>
      <div id="championsList" class="stack"></div>
    </section>
    <section id="matches" class="page">
      <div class="toolbar"><input id="matchSearch" class="search" placeholder="경기 / 플레이어 / 챔피언 검색" oninput="renderMatches()"><select id="matchLimit" class="select" onchange="renderMatches()"><option value="20">20</option><option value="50">50</option><option value="100">100</option></select></div>
      <div id="matchesList" class="stack"></div>
    </section>
    <section id="account" class="page">
      <div id="accountOut" class="account-grid">
        <div class="card"><div class="section-title" style="margin-top:0">로그인</div><div class="form"><input id="loginUsername" class="search" placeholder="아이디"><input id="loginPassword" class="search" type="password" placeholder="비밀번호"><button class="btn" onclick="loginAccount()">로그인</button><div id="loginMessage" class="msg"></div></div></div>
        <div class="card"><div class="section-title" style="margin-top:0">계정 생성</div><div class="form"><input id="signupUsername" class="search" placeholder="새 아이디"><input id="signupPassword" class="search" type="password" placeholder="새 비밀번호"><input id="signupNickname" class="search" placeholder="연결할 플레이어 닉네임"><button class="btn" onclick="signupAccount()">계정 생성</button><div id="signupMessage" class="msg"></div></div></div>
      </div>
      <div id="accountIn" style="display:none" class="account-grid">
        <div class="card"><div class="name" id="accountTitle"></div><div class="sub" id="accountSub"></div><button class="btn ghost" style="margin-top:12px;width:100%" onclick="logoutAccount()">로그아웃</button></div>
      </div>
    </section>
  </main>
  <nav class="tabs">
    <button class="tab active" data-tab="home" onclick="show('home',this)"><i>⌂</i>홈</button>
    <button class="tab" data-tab="players" onclick="show('players',this)"><i>♙</i>플레이어</button>
    <button class="tab" data-tab="champions" onclick="show('champions',this)"><i>⚔</i>챔피언</button>
    <button class="tab" data-tab="matches" onclick="show('matches',this)"><i>≡</i>기록</button>
    <button class="tab" data-tab="account" onclick="show('account',this)"><i>⚙</i>계정</button>
  </nav>
</div>
<div id="detail" class="detail"><div class="detail-head"><button class="back" onclick="closeDetail()">‹</button><div id="detailTitle" class="detail-title"></div></div><div id="detailBody" class="detail-body"></div></div>
<script>
const SUPABASE_URL="https://ehligpqxjczgcggjpzwn.supabase.co";
const SUPABASE_KEY="sb_publishable_QHDiR1qAWGVaKSDZguc0qg_fE_eVCwZ";
const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let players=[],matches=[],records=[],champStats=[],accounts=[],currentAccount=null,championIconMap={};
const DEFAULT_UI_SETTINGS={theme:'purple',sizeChampion:112,sizePlayer:112,sizeMost:68,sizeRecent:76,sizeMatch:300};
const lanes=['TOP','JUG','MID','ADC','SUP'];
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function attr(v){return esc(v)}
function n(v){return Number(v||0)}
function lane(v){v=String(v||'-').toUpperCase();if(['JUNGLE','JGL','JG'].includes(v))return'JUG';if(['SUPPORT','UTILITY'].includes(v))return'SUP';if(['BOTTOM','BOT'].includes(v))return'ADC';return v}
function lp(p){return n(p.lp??p.current_lp)}
function wr(w,g){return g?((w/g)*100).toFixed(1):'0.0'}
function kda(k,d,a){return ((n(k)+n(a))/Math.max(1,n(d))).toFixed(2)}
function playerName(id){const p=players.find(x=>Number(x.id)===Number(id));return p?.nickname||p?.lol_name||'-'}
function recordWin(r){return r.result==='win'||r.win===true}
function flash(id,text){const el=typeof id==='string'?document.getElementById(id):id;if(el)el.textContent=text||''}
async function loadChampionJson(){try{const versions=await fetch('https://ddragon.leagueoflegends.com/api/versions.json').then(r=>r.json());const version=versions[0];const data=await fetch(`https://ddragon.leagueoflegends.com/cdn/${version}/data/ko_KR/champion.json`).then(r=>r.json());Object.values(data.data).forEach(c=>championIconMap[c.name]={id:c.id,version})}catch(e){console.warn(e)}}
function champUrl(name){const c=championIconMap[name];return c?`https://ddragon.leagueoflegends.com/cdn/${c.version}/img/champion/${c.id}.png`:''}
function champImg(name,cls='champ'){const url=champUrl(name);return url?`<img class="${cls}" src="${attr(url)}" onerror="this.outerHTML='<div class=&quot;${cls}&quot;>${esc((name||'?').slice(0,1))}</div>'">`:`<div class="${cls}">${esc((name||'?').slice(0,1))}</div>`}
function profileImg(p){const prof=accounts.find(a=>String(a.nickname||'').toLowerCase()===String(p.nickname||'').toLowerCase())?.profile_settings||{};const url=prof.profile_image||p.profile_image||'';return url?`<img class="avatar round" src="${attr(url)}" onerror="this.outerHTML='<div class=&quot;avatar round&quot;>${esc((p.nickname||'?').slice(0,1))}</div>'">`:`<div class="avatar round">${esc((p.nickname||'?').slice(0,1))}</div>`}
async function init(){await loadChampionJson();await loadPlayers();await Promise.all([loadMatches(),restoreAccount(),loadSeason()]);buildChampionStats();renderAll()}
async function loadPlayers(){const [{data:p},{data:a},{data:r}]=await Promise.all([db.from('bc_players').select('*').order('lp',{ascending:false}),db.from('bc_accounts').select('nickname,profile_settings'),db.from('bc_records').select('*')]);players=p||[];accounts=a||[];records=r||[]}
async function loadMatches(){const {data:m}=await db.from('bc_matches').select('*').order('played_at',{ascending:false}).limit(120);matches=(m||[]).map(x=>({...x,records:records.filter(r=>Number(r.match_id)===Number(x.id))}))}
async function loadSeason(){try{const {data}=await db.from('season_settings').select('*').order('created_at',{ascending:false}).limit(1).maybeSingle();if(data){document.getElementById('mSeason').textContent=data.name||'시즌';document.getElementById('mSeasonSub').textContent=[data.start_date,data.end_date].filter(Boolean).join(' ~ ')}}catch(e){}}
function buildChampionStats(){const map={};records.forEach(r=>{const name=r.champion_name||'알 수 없음',l=lane(r.lane),key=name+'__'+l;if(!map[key])map[key]={champion_name:name,lane:l,games:0,wins:0,kills:0,deaths:0,assists:0,kp:0,score:0};const c=map[key];c.games++;if(recordWin(r))c.wins++;c.kills+=n(r.kills);c.deaths+=n(r.deaths);c.assists+=n(r.assists);c.kp+=n(r.kp);c.score+=n(r.score)});champStats=Object.values(map).sort((a,b)=>scoreChamp(b)-scoreChamp(a))}
function scoreChamp(c){return c.games*4+n(c.score)/Math.max(1,c.games)+Number(wr(c.wins,c.games))}
function renderAll(){renderHome();renderPlayers();renderChampions();renderMatches();renderAccount()}
function show(id,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn?.classList.add('active');document.querySelector('.view').scrollTop=0}
async function refresh(){await init()}
function renderHome(){document.getElementById('mPlayers').textContent=players.length;document.getElementById('mMatches').textContent=matches.length;const week=new Date();week.setDate(week.getDate()-7);document.getElementById('mWeek').textContent=matches.filter(m=>new Date(m.played_at)>=week).length;document.getElementById('homeTop').innerHTML=[...players].sort((a,b)=>lp(b)-lp(a)).slice(0,5).map(playerCard).join('')||empty();document.getElementById('homeMatches').innerHTML=matches.slice(0,3).map(matchCard).join('')||empty()}
function playerCard(p,i=players.indexOf(p)+1){const games=n(p.total_games),wins=n(p.wins);return `<div class="card" onclick="openPlayer(${p.id})"><div class="row"><div class="rank">#${i}</div>${profileImg(p)}<div class="main"><div class="name">${esc(p.nickname||'-')}</div><div class="sub">${lp(p)} LP · ${games}전 ${wins}승 ${n(p.losses)}패 · 승률 ${wr(wins,games)}%</div></div></div><div class="stats"><div class="stat"><b>${lp(p)}</b><span>LP</span></div><div class="stat"><b>${wr(wins,games)}%</b><span>승률</span></div><div class="stat"><b>${games}</b><span>판수</span></div></div></div>`}
function renderPlayers(){const q=document.getElementById('playerSearch')?.value.toLowerCase().trim()||'',sort=document.getElementById('playerSort')?.value||'lp';let list=players.filter(p=>!q||String(p.nickname||'').toLowerCase().includes(q));list.sort((a,b)=>sort==='winrate'?wr(n(b.wins),n(b.total_games))-wr(n(a.wins),n(a.total_games)):sort==='games'?n(b.total_games)-n(a.total_games):sort==='wins'?n(b.wins)-n(a.wins):lp(b)-lp(a));document.getElementById('playersList').innerHTML=list.map((p,i)=>playerCard(p,i+1)).join('')||empty()}
function championCard(c,i){return `<div class="card" onclick="openChampion('${esc(c.champion_name)}','${esc(c.lane)}')"><div class="row"><div class="rank">#${i}</div>${champImg(c.champion_name)}<div class="main"><div class="name">${esc(c.champion_name)}</div><div class="sub">${esc(c.lane)} · ${c.games}판 · 승률 ${wr(c.wins,c.games)}%</div></div><span class="pill">${scoreChamp(c).toFixed(1)}</span></div><div class="stats"><div class="stat"><b>${c.games}</b><span>판수</span></div><div class="stat"><b>${kda(c.kills,c.deaths,c.assists)}</b><span>KDA</span></div><div class="stat"><b>${(c.kp/Math.max(1,c.games)).toFixed(1)}%</b><span>KP</span></div></div></div>`}
function renderChampions(){const q=document.getElementById('champSearch')?.value.toLowerCase().trim()||'',l=document.getElementById('champLane')?.value||'ALL';const list=champStats.filter(c=>(l==='ALL'||c.lane===l)&&(!q||c.champion_name.toLowerCase().includes(q)));document.getElementById('championsList').innerHTML=list.slice(0,80).map((c,i)=>championCard(c,i+1)).join('')||empty()}
function matchText(m){return [m.match_code,...(m.records||[]).flatMap(r=>[r.champion_name,playerName(r.player_id)])].join(' ').toLowerCase()}
function matchCard(m){return `<div class="card match-card" onclick="openMatch(${m.id})"><div class="match-head"><div><div class="match-code">${esc(m.match_code||'MATCH-'+m.id)}</div><div class="sub">${fmt(m.played_at)}</div></div><div class="score"><span class="blue">${m.blue_score??0}</span> : <span class="red">${m.red_score??0}</span></div></div>${compRows(m.records||[])}</div>`}
function compRows(rs){const blue=rs.filter(r=>r.team==='blue'),red=rs.filter(r=>r.team==='red'),mvp=getMvp(rs);return `<div class="comps">${lanes.map(l=>{const b=blue.find(r=>lane(r.lane)===l),r=red.find(r=>lane(r.lane)===l);return `<div class="comp"><div class="side">${b?champImg(b.champion_name,'champ small'):''}<div class="ctext"><div class="cname">${esc(b?.champion_name||'-')}${same(b,mvp)?'<span class="mvp">MVP</span>':''}</div><div class="pname">${b?esc(playerName(b.player_id)):''}</div></div></div><div class="lane">${l}</div><div class="side redside"><div class="ctext"><div class="cname">${same(r,mvp)?'<span class="mvp">MVP</span>':''}${esc(r?.champion_name||'-')}</div><div class="pname">${r?esc(playerName(r.player_id)):''}</div></div>${r?champImg(r.champion_name,'champ small'):''}</div></div>`}).join('')}</div>`}
function renderMatches(){const q=document.getElementById('matchSearch')?.value.toLowerCase().trim()||'',limit=Number(document.getElementById('matchLimit')?.value||20);const list=matches.filter(m=>!q||matchText(m).includes(q)).slice(0,limit);document.getElementById('matchesList').innerHTML=list.map(matchCard).join('')||empty()}
function openMatch(id){const m=matches.find(x=>Number(x.id)===Number(id));if(!m)return;openDetail(m.match_code||'MATCH-'+m.id,`<div class="card"><div class="score"><span class="blue">BLUE ${m.blue_score??0}</span> : <span class="red">${m.red_score??0} RED</span></div><div class="sub">${fmt(m.played_at)}</div></div><div class="section-title">BLUE TEAM</div><div class="team">${detailRecords((m.records||[]).filter(r=>r.team==='blue'))}</div><div class="section-title">RED TEAM</div><div class="team">${detailRecords((m.records||[]).filter(r=>r.team==='red'))}</div>`)}
function detailRecords(rs){const mvp=getMvp(rs);return rs.sort((a,b)=>lanes.indexOf(lane(a.lane))-lanes.indexOf(lane(b.lane))).map(r=>`<div class="record">${champImg(r.champion_name,'champ small')}<div class="main"><div class="name">${esc(playerName(r.player_id))}${same(r,mvp)?' <span class="mvp">MVP</span>':''}</div><div class="sub">${esc(r.champion_name)} · ${lane(r.lane)}</div></div><div class="kda">${n(r.kills)}/${n(r.deaths)}/${n(r.assists)}</div></div>`).join('')||empty()}
function openPlayer(id){const p=players.find(x=>Number(x.id)===Number(id));if(!p)return;const rec=records.filter(r=>Number(r.player_id)===Number(id)).slice(-30).reverse();openDetail(p.nickname,`${playerCard(p)}<div class="section-title">최근 전적</div><div class="stack">${rec.map(r=>`<div class="record">${champImg(r.champion_name,'champ small')}<div class="main"><div class="name ${recordWin(r)?'win':'lose'}">${recordWin(r)?'승리':'패배'}</div><div class="sub">${esc(r.champion_name)} · ${lane(r.lane)}</div></div><div class="kda">${n(r.kills)}/${n(r.deaths)}/${n(r.assists)}</div></div>`).join('')||empty()}</div>`)}
function openChampion(name,l){const rec=records.filter(r=>r.champion_name===name&&(l==='ALL'||lane(r.lane)===l)).slice(-30).reverse();openDetail(name,`<div class="card"><div class="row">${champImg(name)}<div class="main"><div class="name">${esc(name)}</div><div class="sub">${esc(l)} · 최근 ${rec.length}경기</div></div></div></div><div class="section-title">최근 전적</div><div class="stack">${rec.map(r=>`<div class="record">${champImg(r.champion_name,'champ small')}<div class="main"><div class="name">${esc(playerName(r.player_id))}</div><div class="sub ${recordWin(r)?'win':'lose'}">${recordWin(r)?'승리':'패배'} · ${lane(r.lane)}</div></div><div class="kda">${n(r.kills)}/${n(r.deaths)}/${n(r.assists)}</div></div>`).join('')||empty()}</div>`)}
function openDetail(title,html){document.getElementById('detailTitle').textContent=title;document.getElementById('detailBody').innerHTML=html;document.getElementById('detail').classList.add('show')}function closeDetail(){document.getElementById('detail').classList.remove('show')}
function getMvp(rs){const list=(rs||[]).filter(r=>Number.isFinite(n(r.score)));if(!list.length)return null;const max=Math.max(...list.map(r=>n(r.score)));return max>0?list.find(r=>n(r.score)===max):null}function same(a,b){return !!a&&!!b&&Number(a.player_id)===Number(b.player_id)&&Number(a.match_id)===Number(b.match_id)}
function fmt(v){return v?new Date(v).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'-'}function empty(){return'<div class="empty">데이터가 없습니다.</div>'}
async function hashPassword(password,salt){const enc=new TextEncoder();const data=enc.encode(password+'|'+salt);const digest=await crypto.subtle.digest('SHA-256',data);return Array.from(new Uint8Array(digest)).map(b=>b.toString(16).padStart(2,'0')).join('')}function makeSalt(){return crypto.getRandomValues(new Uint32Array(4)).join('-')}
async function signupAccount(){const username=document.getElementById('signupUsername').value.trim(),password=document.getElementById('signupPassword').value,nickname=document.getElementById('signupNickname').value.trim();if(!username||!password){flash('signupMessage','Enter username and password.');return}const salt=makeSalt(),password_hash=await hashPassword(password,salt);const insert={username,password_hash,password_salt:salt,nickname,settings:{...DEFAULT_UI_SETTINGS,lp:0},ui_settings:{...DEFAULT_UI_SETTINGS},profile_settings:{}};const {data,error}=await db.from('bc_accounts').insert(insert).select('*').single();if(error){console.error(error);flash('signupMessage','Signup failed.');return}currentAccount=data;localStorage.setItem('bandleAccountId',data.id);renderAccount();flash('signupMessage','Signup complete.')}
async function loginAccount(){const username=document.getElementById('loginUsername').value.trim(),password=document.getElementById('loginPassword').value;const {data,error}=await db.from('bc_accounts').select('*').eq('username',username).maybeSingle();if(error||!data){flash('loginMessage','Account not found.');return}const h=await hashPassword(password,data.password_salt);if(h!==data.password_hash){flash('loginMessage','Wrong password.');return}currentAccount=data;localStorage.setItem('bandleAccountId',data.id);renderAccount();flash('loginMessage','Login complete.')}
function logoutAccount(){currentAccount=null;localStorage.removeItem('bandleAccountId');renderAccount()}async function restoreAccount(){const id=localStorage.getItem('bandleAccountId');if(!id)return;const {data}=await db.from('bc_accounts').select('*').eq('id',id).maybeSingle();if(data)currentAccount=data}
function renderAccount(){document.getElementById('accountOut').style.display=currentAccount?'none':'flex';document.getElementById('accountIn').style.display=currentAccount?'flex':'none';if(currentAccount){document.getElementById('accountTitle').textContent=currentAccount.username+' 로그인됨';document.getElementById('accountSub').textContent='연결 플레이어: '+(currentAccount.nickname||'미설정')}}
init();
</script>
</body>
</html>
