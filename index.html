<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🏆 BANDLE.GG 🏆</title>
<style>
*{box-sizing:border-box}
html,body{width:100%;margin:0}
body{
  font-family:"맑은 고딕","Malgun Gothic",Arial,sans-serif;
  background:
    radial-gradient(circle at left,rgba(15,23,42,.55),transparent 28%),
    radial-gradient(circle at right,rgba(15,23,42,.55),transparent 28%),
    linear-gradient(90deg,#111827,#1e293b 18%,#1e293b 82%,#111827);
  color:white;
  padding:28px 0;
  min-height:100vh;
  font-weight:900;
}
h1{text-align:center;font-size:42px;margin:0 0 12px;font-weight:1000}
.summary{text-align:center;margin-bottom:20px;color:#cbd5e1;font-size:17px;font-weight:1000}
.top-tabs{width:95%;margin:0 auto 18px;display:flex;justify-content:center;gap:12px}
.tab{padding:12px 34px;border-radius:14px;border:none;color:white;font-size:17px;font-weight:1000;cursor:pointer;background:#4b5563;filter:grayscale(100%);white-space:nowrap}
.tab.active{background:#dc2626;filter:grayscale(0)}
.main-card,.detail-page{width:95%;margin:0 auto}
.search-wrap{position:relative;width:95%;max-width:980px;margin:0 auto 18px}
.search-row{display:flex;gap:8px}
.search-box{width:100%;padding:15px 16px;border-radius:14px;border:1px solid #334155;background:rgba(30,41,59,.95);color:white;font-size:16px;outline:none;font-weight:1000}
.search-btn{width:58px;border:none;border-radius:14px;background:#2563eb;color:white;font-size:22px;cursor:pointer;font-weight:1000;flex-shrink:0}
.suggest-box{position:absolute;top:58px;left:0;right:66px;background:rgba(15,23,42,.98);border:1px solid rgba(96,165,250,.35);border-radius:14px;overflow:hidden;z-index:50;display:none}
.suggest-item{padding:13px 16px;cursor:pointer;color:#e5e7eb;border-bottom:1px solid rgba(51,65,85,.7);font-weight:1000}
.suggest-item:hover{background:rgba(59,130,246,.22)}
.filter-row{width:95%;margin:0 auto 22px;display:flex;justify-content:center;flex-wrap:wrap;gap:10px}
.lane-filter,.recent-lane-filter,.master-filter{
  display:flex;align-items:center;justify-content:center;gap:7px;
  border:1px solid rgba(148,163,184,.25);
  background:rgba(30,41,59,.92);
  color:white;
  padding:10px 16px;
  border-radius:999px;
  font-weight:1000;
  cursor:pointer;
  white-space:nowrap;
}
.lane-filter.active,.recent-lane-filter.active,.master-filter.active{background:#2563eb;border-color:#60a5fa}
.lane-icon{width:23px;height:23px;object-fit:contain;flex-shrink:0}
table{width:100%;border-collapse:separate;border-spacing:0 10px;table-layout:fixed}
th{padding:10px 5px;background:rgba(51,65,85,.95);color:#93c5fd;text-align:center;font-weight:1000;white-space:nowrap}
td{padding:14px 7px;text-align:center;background:rgba(51,65,85,.88);border-bottom:1px solid rgba(71,85,105,.55);vertical-align:middle;font-weight:1000;color:#f8fafc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
th:first-child,td:first-child{border-radius:14px 0 0 14px}
th:last-child,td:last-child{border-radius:0 14px 14px 0}
tbody tr:hover td{background:rgba(71,85,105,.95)}
.sort-btn{border:none;border-radius:10px;padding:8px 7px;background:rgba(30,64,175,.78);color:#dbeafe;cursor:pointer;font-weight:1000;width:100%;font-family:"맑은 고딕","Malgun Gothic",Arial,sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sort-btn:hover{background:#1d4ed8;color:white}
.clickable-row{cursor:pointer}
.nickname{font-weight:1000;color:white}
.player-name-cell{display:flex;align-items:center;gap:8px;justify-content:flex-start}
.player-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.2);flex-shrink:0}
.win{color:#22c55e!important}.loss{color:#ef4444!important}
.rate-high{color:#22c55e!important}.rate-mid{color:#facc15!important}.rate-low{color:#f87171!important}
.low-participation td{color:#cbd5e1!important;filter:grayscale(70%)}
.group-divider td{height:18px;padding:0!important;background:transparent!important;border-bottom:2px solid rgba(147,197,253,.5);border-radius:0!important}
.champ-cell{display:flex;align-items:center;justify-content:flex-start;gap:8px;padding-left:4px;width:100%;min-width:0}
.champ-td{text-align:left!important}
.champ-name{font-weight:1000;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-align:left}
.champ-lane-icon{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center}
.champ-lane-icon .lane-icon{width:21px;height:21px}
.champ-icon{width:44px;height:44px;border-radius:10px;border:2px solid #334155;object-fit:cover;flex-shrink:0}
.champ-icon.big{width:112px;height:112px;border-radius:24px}
.combo-portrait-wrap{border-radius:12px;padding:2px;display:inline-flex;width:48px;height:48px;align-items:center;justify-content:center;flex-shrink:0}
.tier-red{border-color:#ff334e!important;box-shadow:0 0 18px rgba(239,68,68,.65)}
.tier-orange{border-color:#ff8a1c!important;box-shadow:0 0 18px rgba(249,115,22,.6)}
.tier-yellow{border-color:#ffe14d!important;box-shadow:0 0 18px rgba(250,204,21,.55)}
.tier-green{border-color:#31e981!important;box-shadow:0 0 18px rgba(34,197,94,.55)}
.tier-blue{border-color:#60a5fa!important;box-shadow:0 0 18px rgba(59,130,246,.55)}
.tier-badge{
  position:relative;display:inline-flex;align-items:center;justify-content:center;
  min-width:74px;height:36px;padding:0 15px;border-radius:999px;
  font-weight:1000;font-size:16px;letter-spacing:.6px;color:white;
  border:2px solid rgba(255,255,255,.35);overflow:hidden;
  box-shadow:inset 0 2px 0 rgba(255,255,255,.32),inset 0 -14px 18px rgba(0,0,0,.25),0 0 18px rgba(0,0,0,.35);
  text-shadow:0 2px 6px rgba(0,0,0,.55);
}
.tier-badge::before{content:"";position:absolute;inset:3px;border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.28),transparent 58%);pointer-events:none}
.tier-badge span{position:relative;z-index:2}
.tier-op{background:linear-gradient(135deg,#450a0a,#b91c1c 45%,#fb7185);border-color:#fb7185}
.tier-s{background:linear-gradient(135deg,#431407,#ea580c 45%,#fdba74);border-color:#fb923c}
.tier-a{background:linear-gradient(135deg,#422006,#ca8a04 45%,#fde047);border-color:#fde047;color:#111827;text-shadow:0 1px 0 rgba(255,255,255,.25)}
.tier-b{background:linear-gradient(135deg,#052e16,#16a34a 45%,#86efac);border-color:#4ade80;color:#052e16;text-shadow:0 1px 0 rgba(255,255,255,.2)}
.tier-c{background:linear-gradient(135deg,#172554,#2563eb 45%,#93c5fd);border-color:#60a5fa}
.tier-plus{margin-left:5px;padding:1px 6px;border-radius:999px;background:rgba(15,23,42,.8);border:1px solid rgba(255,255,255,.25);color:#e5e7eb;font-size:12px;font-weight:1000}
.back-btn{border:none;background:rgba(30,41,59,.85);color:#cbd5e1;border-radius:12px;padding:9px 14px;font-weight:1000;cursor:pointer;margin-bottom:18px}
.detail-page{display:none}
.detail-hero{background:rgba(15,23,42,.92);border:1px solid rgba(96,165,250,.35);border-radius:22px;padding:22px;display:flex;align-items:center;gap:20px;margin-bottom:18px}
.profile-box{width:106px;height:106px;border-radius:22px;background:#020617;border:1px solid rgba(148,163,184,.25);display:flex;align-items:center;justify-content:center;text-align:center;color:#94a3b8;font-size:12px;font-weight:1000;overflow:hidden;flex-shrink:0}
.profile-box img{width:100%;height:100%;object-fit:cover}
.hero-title{font-size:34px;font-weight:1000;margin-bottom:10px}
.hero-sub{display:flex;gap:8px;flex-wrap:wrap}
.lane-pill{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:rgba(30,41,59,.95);border:1px solid rgba(148,163,184,.25);font-weight:1000;color:#dbeafe;white-space:nowrap}
.section{background:rgba(15,23,42,.92);border:1px solid rgba(96,165,250,.26);border-radius:22px;padding:18px;margin-bottom:18px}
.section-title{font-size:20px;font-weight:1000;color:#bfdbfe;margin-bottom:14px}
.stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.stat-card{background:rgba(30,41,59,.95);border:1px solid rgba(148,163,184,.25);border-radius:15px;padding:14px 10px;text-align:center}
.stat-label{color:#cbd5e1;font-size:13px;margin-bottom:6px}
.stat-value{font-size:21px}
.record-blocks{display:flex;gap:0;flex-wrap:wrap}
.result-block{width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:white;font-weight:1000;border-radius:10px;margin-right:4px}
.result-win{background:#22c55e}.result-loss{background:#ef4444}
.recent-lane-wrapper img{width:14px!important;height:14px!important;object-fit:contain}
.lane-ratio-row{margin-bottom:12px}
.ratio-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-weight:1000}
.ratio-bar-bg{background:rgba(30,41,59,.95);height:15px;border-radius:999px;overflow:hidden}
.ratio-bar{height:100%;background:#2563eb;border-radius:999px}
.detail-table{width:100%;border-spacing:0 8px;table-layout:fixed}
.detail-table th,.detail-table td{font-size:13px;font-weight:1000}
.detail-table th{background:rgba(30,41,59,.95)}
.detail-table td{background:rgba(51,65,85,.82)}
.record-icons{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px}
.small-champ-icon{width:28px;height:28px;border-radius:8px;object-fit:cover}
.master-filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.hide{display:none!important}
.col-rank{width:4.5%}.col-tier{width:11%}.col-small{width:6.5%}.col-rate{width:9%}.col-name{width:22%}.col-champ{width:28%}.col-lane{width:8%}.col-score{width:7%}.col-auto{width:auto}
.collapsible-header{display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;user-select:none;margin-bottom:0}
.collapse-toggle{border:1px solid rgba(96,165,250,.35);background:rgba(30,41,59,.92);color:#dbeafe;border-radius:999px;padding:8px 12px;font-weight:1000;cursor:pointer;white-space:nowrap}
.collapsible-content{max-height:0;opacity:0;overflow:hidden;margin-top:0;transition:max-height .42s ease,opacity .28s ease,margin-top .42s ease}
.collapsible-section.open .collapsible-content{max-height:2600px;opacity:1;margin-top:14px}
.collapse-arrow{display:inline-block;transition:transform .28s ease;margin-left:6px}
.collapsible-section.open .collapse-arrow{transform:rotate(180deg)}
.recent-control-wrap{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start;margin-bottom:12px}
.recent-search-wrap{position:relative;flex:1;min-width:240px}
.recent-search-row{display:flex;gap:8px}
.recent-search-box{width:100%;padding:12px 14px;border-radius:13px;border:1px solid #334155;background:rgba(30,41,59,.95);color:white;font-size:14px;outline:none;font-weight:1000}
.recent-search-btn{width:50px;border:none;border-radius:13px;background:#2563eb;color:white;font-size:18px;cursor:pointer;font-weight:1000;flex-shrink:0}
.recent-suggest-box{position:absolute;top:50px;left:0;right:58px;background:rgba(15,23,42,.98);border:1px solid rgba(96,165,250,.35);border-radius:14px;overflow:hidden;z-index:60;display:none}
.recent-filter-row{display:flex;gap:8px;flex-wrap:wrap}
.recent-lane-filter{padding:9px 12px}
.recent-table{table-layout:fixed}
.recent-table .recent-col-champ{width:15%}
.recent-table .recent-col-lane{width:8%}
.recent-table .recent-col-kda{width:12%}
.recent-table .recent-col-kdarate{width:10%}
.recent-table .recent-col-kp{width:11%}
.recent-table .recent-col-score{width:10%}
.recent-table .recent-col-oppchamp{width:15%}
.recent-table .recent-col-opplane{width:8%}
.recent-table .recent-col-oppname{width:11%}
.recent-table td{padding:10px 6px}
.recent-table .champ-icon{width:34px;height:34px;border-radius:9px}
.recent-empty{color:#cbd5e1;font-weight:1000;padding:10px 0}
@media(max-width:1100px){
  body{padding:22px 0}
  h1{font-size:36px}
  th,td{font-size:13px;padding:11px 5px}
  .sort-btn{font-size:12px;padding:7px 4px}
  .champ-icon{width:38px;height:38px}
  .tier-badge{min-width:44px;height:30px;padding:0 9px}
}
@media(max-width:760px){
  body{padding:14px 0}
  h1{font-size:28px}
  .top-tabs{gap:8px}
  .tab{flex:1;padding:10px 0;font-size:15px}
  .search-box{font-size:14px;padding:13px}
  .search-btn{width:50px}
  .lane-filter{padding:8px 10px;font-size:13px}
  .lane-icon{width:19px;height:19px}
  th,td{font-size:11px;padding:9px 3px}
  .sort-btn{font-size:10px;padding:6px 2px;border-radius:8px}
  .champ-icon{width:30px;height:30px;border-radius:8px}
  .champ-cell{gap:5px;padding-left:2px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .detail-hero{align-items:flex-start;padding:16px;gap:12px}
  .champ-icon.big,.profile-box{width:76px;height:76px;border-radius:18px}
  .hero-title{font-size:24px}
  .section{padding:14px}
  .section-title{font-size:17px}
  .detail-table th,.detail-table td{font-size:10px}
  .recent-search-wrap{min-width:100%}
  .recent-lane-filter{padding:7px 9px;font-size:12px}
  .recent-table th,.recent-table td{font-size:9px;padding:8px 3px}
  .recent-table .champ-icon{width:26px;height:26px}
}
</style>
</head>

<body>
<h1>🏆 BANDLE.GG 🏆</h1>

<div class="top-tabs">
  <button id="playerTab" class="tab active">플레이어</button>
  <button id="championTab" class="tab">챔피언</button>
</div>

<div class="summary" id="summary">데이터 불러오는 중...</div>

<div id="mainPage" class="main-card">
  <div class="search-wrap">
    <div class="search-row">
      <input id="searchInput" class="search-box" type="text" placeholder="검색어 입력..." autocomplete="off" />
      <button id="searchBtn" class="search-btn">🔍</button>
    </div>
    <div id="suggestBox" class="suggest-box"></div>
  </div>

  <div id="laneFilters" class="filter-row"></div>

  <table id="playerTable">
    <colgroup>
      <col class="col-rank"><col class="col-name"><col class="col-small"><col class="col-small"><col class="col-small"><col class="col-rate"><col class="col-rate"><col class="col-rate">
    </colgroup>
    <thead>
      <tr>
        <th>순위</th>
        <th><button class="sort-btn" onclick="sortPlayer('name')">닉네임</button></th>
        <th><button class="sort-btn" onclick="sortPlayer('games')">판수</button></th>
        <th><button class="sort-btn" onclick="sortPlayer('wins')">승</button></th>
        <th><button class="sort-btn" onclick="sortPlayer('losses')">패</button></th>
        <th><button class="sort-btn" onclick="sortPlayer('winRate')">승률</button></th>
        <th><button class="sort-btn" onclick="sortPlayer('kp')">킬관여율</button></th>
        <th><button class="sort-btn" onclick="sortPlayer('participation')">참여율</button></th>
      </tr>
    </thead>
    <tbody id="playerRanking"></tbody>
  </table>

  <table id="championTable" class="hide">
    <colgroup>
      <col class="col-rank"><col class="col-tier"><col class="col-champ"><col class="col-small"><col class="col-small"><col class="col-small"><col class="col-rate"><col class="col-rate"><col class="col-rate"><col class="col-rate">
    </colgroup>
    <thead>
      <tr>
        <th>순위</th>
        <th><button class="sort-btn" onclick="sortChampion('tier')">티어</button></th>
        <th><button class="sort-btn" onclick="sortChampion('name')">챔피언</button></th>
        <th><button class="sort-btn" onclick="sortChampion('games')">판수</button></th>
        <th><button class="sort-btn" onclick="sortChampion('wins')">승</button></th>
        <th><button class="sort-btn" onclick="sortChampion('losses')">패</button></th>
        <th><button class="sort-btn" onclick="sortChampion('winRate')">승률</button></th>
        <th><button class="sort-btn" onclick="sortChampion('pickRate')">픽률</button></th>
        <th><button class="sort-btn" onclick="sortChampion('banRate')">밴율</button></th>
        <th><button class="sort-btn" onclick="sortChampion('kp')">킬관여율</button></th>
      </tr>
    </thead>
    <tbody id="championRanking"></tbody>
  </table>
</div>

<div id="detailPage" class="detail-page">
  <button class="back-btn" onclick="goBack()">← 뒤로가기</button>
  <div id="detailContent"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL="https://ehligpqxjczgcggjpzwn.supabase.co";
const SUPABASE_KEY="sb_publishable_QHDiR1qAWGVaKSDZguc0qg_fE_eVCwZ";
const supabase=createClient(SUPABASE_URL,SUPABASE_KEY);

const LANE_ORDER=["TOP","JUNGLE","MID","ADC","SUPPORT"];
const LANE_LABELS={ALL:"전체",TOP:"탑",JUNGLE:"정글",MID:"미드",ADC:"원딜",SUPPORT:"서폿"};
const LANE_ICON_URLS={
  TOP:"https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/svg/position-top.svg",
  JUNGLE:"https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/svg/position-jungle.svg",
  MID:"https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/svg/position-middle.svg",
  ADC:"https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/svg/position-bottom.svg",
  SUPPORT:"https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/svg/position-utility.svg"
};
const TIER_CLASS={OP:"tier-red",S:"tier-orange",A:"tier-yellow",B:"tier-green",C:"tier-blue"};

let players=[],rows=[],bans=[],matches=[],totalGames=0;
let currentTab="player",currentLane="ALL",activeSearch="";
let playerSort="winRate",playerAsc=false,championSort="tier",championAsc=true,mostSort="score",mostAsc=false,masterSort="score",masterAsc=false,masterLane="ALL";
let recentLane="ALL",recentChampionSearch="";
let latestVersion="15.12.1",championNameToId={};

const playerTab=document.getElementById("playerTab");
const championTab=document.getElementById("championTab");
const searchInput=document.getElementById("searchInput");
const searchBtn=document.getElementById("searchBtn");
const suggestBox=document.getElementById("suggestBox");

playerTab.onclick=()=>{
  currentTab="player";
  activeSearch="";
  searchInput.value="";
  playerTab.classList.add("active");
  championTab.classList.remove("active");
  document.getElementById("playerTable").classList.remove("hide");
  document.getElementById("championTable").classList.add("hide");
  renderLaneFilters();
  renderMain();
};
championTab.onclick=()=>{
  currentTab="champion";
  activeSearch="";
  searchInput.value="";
  championTab.classList.add("active");
  playerTab.classList.remove("active");
  document.getElementById("championTable").classList.remove("hide");
  document.getElementById("playerTable").classList.add("hide");
  renderLaneFilters();
  renderMain();
};
searchInput.addEventListener("input",renderSuggestions);
searchInput.addEventListener("keydown",e=>{if(e.key==="Enter")runSearch(searchInput.value.trim())});
searchBtn.onclick=()=>runSearch(searchInput.value.trim());

window.sortPlayer=function(type){
  if(playerSort===type)playerAsc=!playerAsc;
  else{playerSort=type;playerAsc=type==="name"}
  renderMain();
};
window.sortChampion=function(type){
  if(championSort===type)championAsc=!championAsc;
  else{championSort=type;championAsc=type==="name"||type==="tier"}
  renderMain();
};
window.sortMost=function(type,playerName){
  if(mostSort===type)mostAsc=!mostAsc;
  else{mostSort=type;mostAsc=type==="name"}
  renderMostChampionArea(playerName);
};
window.sortMaster=function(type,championName){
  if(masterSort===type)masterAsc=!masterAsc;
  else{masterSort=type;masterAsc=type==="name"}
  renderMasterRankingArea(championName);
};
window.setMasterLane=function(lane,championName){
  masterLane=lane;
  renderMasterRankingArea(championName);
};
window.openPlayerDetail=openPlayerDetail;
window.openChampionDetail=openChampionDetail;
window.goBack=goBack;
window.runSearch=runSearch;
window.toggleCollapsible=toggleCollapsible;
window.setRecentLane=setRecentLane;
window.runRecentSearch=runRecentSearch;
window.renderRecentSuggestions=renderRecentSuggestions;

async function loadChampionMeta(){
  try{
    const versionRes=await fetch("https://ddragon.leagueoflegends.com/api/versions.json");
    const versions=await versionRes.json();
    latestVersion=versions[0];
    const champRes=await fetch(`https://ddragon.leagueoflegends.com/cdn/${latestVersion}/data/ko_KR/champion.json`);
    const champJson=await champRes.json();
    championNameToId={};
    Object.values(champJson.data).forEach(champ=>{
      championNameToId[champ.name]=champ.id;
    });
  }catch(e){
    console.error("챔피언 메타 로드 실패:",e);
  }
}

function champImg(name){
  const id=championNameToId[name];
  if(!id)return"";
  return`https://ddragon.leagueoflegends.com/cdn/${latestVersion}/img/champion/${id}.png`;
}
function laneIcon(lane){
  if(!LANE_ICON_URLS[lane])return"";
  return`<img class="lane-icon" src="${LANE_ICON_URLS[lane]}" onerror="this.style.display='none'" />`;
}
function lanePill(lane){
  return`<span class="lane-pill">${laneIcon(lane)} ${LANE_LABELS[lane]||lane}</span>`;
}
function safe(value){
  return String(value??"").replaceAll("\\","\\\\").replaceAll("'","\\'").replaceAll('"',"&quot;");
}
function htmlSafe(value){
  return String(value??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
}
function num(v){return Number(v)||0}
function pct(v){if(!isFinite(v))return"0.0%";return`${v.toFixed(1)}%`}
function rateClass(rate){if(rate>=60)return"rate-high";if(rate>=50)return"rate-mid";return"rate-low"}
function getKda(k,d,a){return d===0?k+a:(k+a)/d}
function kp(row){
  const teamKills=num(row.team_kills);
  if(teamKills<=0)return null;
  return(num(row.kills)+num(row.assists))/teamKills*100;
}
function average(arr){
  if(!arr.length)return 0;
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}
function rankText(rank){
  if(rank===1)return"🥇";
  if(rank===2)return"🥈";
  if(rank===3)return"🥉";
  return rank;
}
function compareName(a,b){return String(a).localeCompare(String(b),"ko")}
function effectiveLane(){return activeSearch?"ALL":currentLane}
function getParticipationGroup(participation){
  if(participation>=30)return 0;
  if(participation>=10)return 1;
  return 2;
}

function tierBadge(tier){
  const cls={OP:"tier-op",S:"tier-s",A:"tier-a",B:"tier-b",C:"tier-c"}[tier]||"tier-c";
  return`<span class="tier-badge ${cls}"><span>${tier}</span></span>`;
}
function tierColor(tier){
  return{OP:"#ef4444",S:"#fb923c",A:"#fde047",B:"#4ade80",C:"#60a5fa"}[tier]||"#60a5fa";
}
function bestTierFromList(tiers){
  const tierOrder={OP:1,S:2,A:3,B:4,C:5};
  const unique=[...new Set((tiers||[]).filter(Boolean))];
  unique.sort((a,b)=>(tierOrder[a]||99)-(tierOrder[b]||99));
  return unique[0]||"C";
}
function comboTierBadge(tiers){
  if(!tiers||!tiers.length)return tierBadge("C");
  const unique=[...new Set(tiers.filter(Boolean))];
  const best=bestTierFromList(unique);
  const extra=Math.max(unique.length-1,0);
  return`
    <span style="display:inline-flex;align-items:center;justify-content:center;gap:4px;">
      ${tierBadge(best)}
      ${extra>0?`<span class="tier-plus">+${extra}</span>`:""}
    </span>
  `;
}
function comboPortraitStyle(tiers){
  if(!tiers||!tiers.length)return"background:transparent;";
  const filtered=tiers.filter(Boolean);
  if(filtered.length<=1)return"background:transparent;";
  const total=filtered.length;
  let current=0;
  const parts=filtered.map(t=>{
    const start=current;
    current+=100/total;
    const end=current;
    return`${tierColor(t)} ${start}% ${end}%`;
  });
  return`background:conic-gradient(${parts.join(",")});`;
}
function championScore(champ){
  return champ.winRate*.48+champ.pickRate*1.7+champ.banRate*1.05+champ.kp*.12+Math.min(champ.games,30)*.85;
}
function assignChampionTiers(list){
  const ranked=[...list].filter(c=>c.games>=1).sort((a,b)=>b.score-a.score);
  const total=ranked.length||1;
  ranked.forEach((c,i)=>{
    const p=(i+1)/total;
    if(p<=0.10)c.tier="OP";
    else if(p<=0.25)c.tier="S";
    else if(p<=0.50)c.tier="A";
    else if(p<=0.75)c.tier="B";
    else c.tier="C";
  });
  return ranked;
}

function calcPlayerStats(playerName,lane="ALL"){
  let data=rows.filter(r=>r.lol_name===playerName);
  if(lane!=="ALL")data=data.filter(r=>r.lane===lane);

  const games=data.length;
  const wins=data.filter(r=>r.win).length;
  const losses=games-wins;
  const winRate=games?wins/games*100:0;
  const allGames=rows.filter(r=>r.lol_name===playerName).length;
  const participation=totalGames?allGames/totalGames*100:0;
  const kills=data.reduce((s,r)=>s+num(r.kills),0);
  const deaths=data.reduce((s,r)=>s+num(r.deaths),0);
  const assists=data.reduce((s,r)=>s+num(r.assists),0);
  const kpList=data.map(kp).filter(v=>v!==null);

  return{
    name:playerName,
    games,wins,losses,winRate,participation,
    avgKills:games?kills/games:0,
    avgDeaths:games?deaths/games:0,
    avgAssists:games?assists/games:0,
    kda:getKda(kills,deaths,assists),
    kp:average(kpList),
    rows:data
  };
}

function calcChampionStats(championName,lane="ALL"){
  let data=rows.filter(r=>r.champion_name===championName);
  if(lane!=="ALL")data=data.filter(r=>r.lane===lane);

  const games=data.length;
  const wins=data.filter(r=>r.win).length;
  const losses=games-wins;
  const winRate=games?wins/games*100:0;
  const pickRate=totalGames?games/totalGames*100:0;
  const banCount=bans.filter(b=>b.champion_name===championName).length;
  const banRate=totalGames?banCount/totalGames*100:0;
  const kills=data.reduce((s,r)=>s+num(r.kills),0);
  const deaths=data.reduce((s,r)=>s+num(r.deaths),0);
  const assists=data.reduce((s,r)=>s+num(r.assists),0);
  const kpList=data.map(kp).filter(v=>v!==null);

  const stat={
    name:championName,
    lane,
    games,wins,losses,winRate,pickRate,banRate,
    avgKills:games?kills/games:0,
    avgDeaths:games?deaths/games:0,
    avgAssists:games?assists/games:0,
    kda:getKda(kills,deaths,assists),
    kp:average(kpList),
    rows:data,
    tier:"C"
  };

  stat.score=championScore(stat);
  return stat;
}

function getAllChampionComboList(){
  const map={};
  rows.forEach(r=>{
    if(!r.champion_name||!r.lane)return;
    const key=`${r.champion_name}__${r.lane}`;
    map[key]={champion:r.champion_name,lane:r.lane};
  });

  const list=Object.values(map).map(item=>{
    const stat=calcChampionStats(item.champion,item.lane);
    stat.displayName=item.champion;
    stat.displayLane=item.lane;
    return stat;
  }).filter(c=>c.games>=1);

  return assignChampionTiers(list);
}

function getPlayerRanking(){
  const lane=effectiveLane();
  let list=players.map(p=>({
    ...calcPlayerStats(p.lol_name,lane),
    profile_image_url:p.profile_image_url||""
  }));

  if(lane!=="ALL")list=list.filter(p=>p.games>0);
  if(activeSearch){
    const q=activeSearch.toLowerCase();
    list=list.filter(p=>p.name.toLowerCase().includes(q));
  }

  list.sort((a,b)=>{
    if(playerSort==="winRate"&&!activeSearch){
      const ga=getParticipationGroup(a.participation);
      const gb=getParticipationGroup(b.participation);
      if(ga!==gb)return ga-gb;
      return playerAsc?a.winRate-b.winRate:b.winRate-a.winRate;
    }

    let result=0;
    if(playerSort==="name")result=compareName(a.name,b.name);
    else if(playerSort==="games")result=a.games-b.games;
    else if(playerSort==="wins")result=a.wins-b.wins;
    else if(playerSort==="losses")result=a.losses-b.losses;
    else if(playerSort==="participation")result=a.participation-b.participation;
    else if(playerSort==="kp")result=a.kp-b.kp;
    else result=a.winRate-b.winRate;

    return playerAsc?result:-result;
  });

  return list;
}

function getChampionRanking(){
  const lane=effectiveLane();
  const allList=getAllChampionComboList();
  let list=[];

  if(championSort==="banRate"){
    const champMap={};
    allList.forEach(c=>{
      if(!champMap[c.name]){
        const allStat=calcChampionStats(c.name,"ALL");
        champMap[c.name]={
          ...allStat,
          displayLane:"BAN_MERGED",
          tierList:[],
          scoreList:[]
        };
      }
      champMap[c.name].tierList.push(c.tier);
      champMap[c.name].scoreList.push(c.score);
    });

    list=Object.values(champMap).map(c=>{
      c.tierList=c.tierList.filter(Boolean);
      c.tier=bestTierFromList(c.tierList);
      c.score=Math.max(...c.scoreList,0);
      return c;
    });
  }else{
    list=allList;
    if(lane!=="ALL")list=list.filter(c=>c.displayLane===lane);
  }

  if(activeSearch){
    const q=activeSearch.toLowerCase();
    list=list.filter(c=>c.name.toLowerCase().includes(q));
  }

  list.sort((a,b)=>{
    const tierOrder={OP:1,S:2,A:3,B:4,C:5};
    let result=0;

    if(championSort==="tier")result=tierOrder[a.tier]-tierOrder[b.tier]||b.score-a.score;
    else if(championSort==="name")result=compareName(a.name,b.name);
    else if(championSort==="games")result=a.games-b.games;
    else if(championSort==="wins")result=a.wins-b.wins;
    else if(championSort==="losses")result=a.losses-b.losses;
    else if(championSort==="pickRate")result=a.pickRate-b.pickRate;
    else if(championSort==="banRate")result=a.banRate-b.banRate||a.games-b.games;
    else if(championSort==="kp")result=a.kp-b.kp;
    else if(championSort==="winRate")result=a.winRate-b.winRate;
    else result=a.score-b.score;

    return championAsc?result:-result;
  });

  return list;
}

function streaks(data){
  const sorted=[...data].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  let maxWin=0,maxLose=0,curWin=0,curLose=0;
  sorted.forEach(r=>{
    if(r.win){curWin++;curLose=0}
    else{curLose++;curWin=0}
    maxWin=Math.max(maxWin,curWin);
    maxLose=Math.max(maxLose,curLose);
  });
  return{maxWin,maxLose};
}

    return bv-av;
  })[0];
}

function getPlayerMostStats(playerName){
  const data=rows.filter(r=>r.lol_name===playerName);
  const map={};

  data.forEach(r=>{
    if(!r.champion_name)return;
    const key=`${r.champion_name}__${r.lane||"UNKNOWN"}`;
    if(!map[key])map[key]=[];

    const [champion,lane]=key.split("__");
    const games=arr.length;
    const wins=arr.filter(r=>r.win).length;
    const losses=games-wins;
    const kills=arr.reduce((s,r)=>s+num(r.kills),0);
    const deaths=arr.reduce((s,r)=>s+num(r.deaths),0);
    const assists=arr.reduce((s,r)=>s+num(r.assists),0);
    const kpList=arr.map(kp).filter(v=>v!==null);
    const winRate=games?wins/games*100:0;
    const avgKills=games?kills/games:0;
    const avgDeaths=games?deaths/games:0;
    const avgAssists=games?assists/games:0;
    const kdaValue=getKda(kills,deaths,assists);
    const kpAvg=average(kpList);
    const score=games*8+winRate*.45+kdaValue*4+kpAvg*.15;

    return{champion,lane,games,wins,losses,winRate,avgKills,avgDeaths,avgAssists,kda:kdaValue,kp:kpAvg,score};
  });

  list.sort((a,b)=>{
    let result=0;
    if(mostSort==="name")result=compareName(a.champion,b.champion);
    else if(mostSort==="games")result=a.games-b.games;
    else if(mostSort==="winRate")result=a.winRate-b.winRate;
    else if(mostSort==="avgKills")result=a.avgKills-b.avgKills;
    else if(mostSort==="avgDeaths")result=a.avgDeaths-b.avgDeaths;
    else if(mostSort==="avgAssists")result=a.avgAssists-b.avgAssists;
    else if(mostSort==="kda")result=a.kda-b.kda;
    else if(mostSort==="kp")result=a.kp-b.kp;
    else result=a.score-b.score;
    return mostAsc?result:-result;
  });

  return list;
}

function findOpponent(row){
  const sameMatch=rows.filter(r=>r.match_id===row.match_id&&r.lol_name!==row.lol_name);

  let opponent=sameMatch.find(r=>r.lane===row.lane&&r.win!==row.win);
  if(!opponent)opponent=sameMatch.find(r=>r.lane===row.lane);

  return opponent||null;
}

function recentMatchScore(row){
  const k=num(row.kills);
  const d=num(row.deaths);
  const a=num(row.assists);
  const kdaValue=getKda(k,d,a);
  const kpValue=kp(row)||0;
  const resultBonus=row.win?12:0;
  return k*3+a*2-d*2+kdaValue*4+kpValue*.25+resultBonus;
}

function getMasterStats(championName,lane=masterLane){
  let data=rows.filter(r=>r.champion_name===championName);
  if(lane!=="ALL")data=data.filter(r=>r.lane===lane);

  const map={};
  data.forEach(r=>{
    if(!map[r.lol_name])map[r.lol_name]=[];
    map[r.lol_name].push(r);
  });

  let list=Object.entries(map).map(([name,arr])=>{
    const games=arr.length;
    const wins=arr.filter(r=>r.win).length;
    const losses=games-wins;
    const kills=arr.reduce((s,r)=>s+num(r.kills),0);
    const deaths=arr.reduce((s,r)=>s+num(r.deaths),0);
    const assists=arr.reduce((s,r)=>s+num(r.assists),0);
    const kpList=arr.map(kp).filter(v=>v!==null);
    const winRate=games?wins/games*100:0;
    const avgKills=games?kills/games:0;
    const avgDeaths=games?deaths/games:0;
    const avgAssists=games?assists/games:0;
    const kdaValue=getKda(kills,deaths,assists);
    const kpAvg=average(kpList);
    const score=games*8+winRate*.45+kdaValue*4+kpAvg*.15;

    return{name,games,wins,losses,winRate,avgKills,avgDeaths,avgAssists,kda:kdaValue,kp:kpAvg,score};
  });

  list.sort((a,b)=>{
    let result=0;
    if(masterSort==="name")result=compareName(a.name,b.name);
    else if(masterSort==="games")result=a.games-b.games;
    else if(masterSort==="winRate")result=a.winRate-b.winRate;
    else if(masterSort==="avgKills")result=a.avgKills-b.avgKills;
    else if(masterSort==="avgDeaths")result=a.avgDeaths-b.avgDeaths;
    else if(masterSort==="avgAssists")result=a.avgAssists-b.avgAssists;
    else if(masterSort==="kda")result=a.kda-b.kda;
    else if(masterSort==="kp")result=a.kp-b.kp;
    else result=a.score-b.score;
    return masterAsc?result:-result;
  });

  return list;
}

        {label:"최다 데스",value:bestDeath?`${num(bestDeath.deaths)}회`:"-",extra:championRecordExtra(bestDeath)},
        {label:"최다 어시스트",value:bestAssist?`${num(bestAssist.assists)}회`:"-",extra:championRecordExtra(bestAssist)},
        {label:"최대 킬관여율",value:bestKp?pct(kp(bestKp)||0):"-",extra:championRecordExtra(bestKp)}
      ])}
    </div>

    <div class="section">
      <div class="section-title">최근 기록 10판</div>
      ${recentBlocks(data)}
    </div>

    <div class="section">
      <div class="section-title">라인 비율</div>
      ${laneRatio(data)}
    </div>

    <div class="section">
      <div class="section-title">라인별 통계</div>
      ${tableStatsRows(getChampionLaneStats(championName),"라인")}
    </div>

    <div class="section">
      <div class="section-title">${htmlSafe(championName)} 장인 랭킹</div>
      <div id="masterRankingArea"></div>
    </div>
  `;

  showDetail(html);
  renderMasterRankingArea(championName);
}

loadData();
setInterval(loadData,30000);
</script>
</body>
</html>
