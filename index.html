<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🏆 BANDLE.GG 🏆</title>
<style>
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;background:#07111f;color:#fff;font-family:"Malgun Gothic",Arial,sans-serif;font-weight:900;padding:22px 18px;background-image:radial-gradient(circle at 20% 0,rgba(37,99,235,.18),transparent 28%),linear-gradient(180deg,#07111f,#0b1624 45%,#07111f)}
button,input{font-family:inherit;font-weight:900}.app-head{position:relative;display:grid;grid-template-columns:280px 1fr 320px;gap:18px;align-items:start;margin:0 auto 28px;max-width:1500px}.brand{text-align:center}.brand h1{margin:0;font-size:42px;letter-spacing:.5px}.summary{margin-top:8px;color:#aebbd0;font-size:18px}.top-tabs{display:flex;gap:10px}.tab{height:52px;min-width:145px;border:0;border-radius:9px;background:rgba(25,38,56,.9);color:#dbe7fb;font-size:17px;cursor:pointer;transition:.16s}.tab.active{background:linear-gradient(135deg,#cf2026,#8e1620);color:white}.tab.active:hover,.search-btn:hover,.lane-filter.active:hover,.recent-lane-filter.active:hover,.master-filter.active:hover,.sort-btn:hover,.clickable-row:hover,.clickable-cell:hover,.stat-card.clickable:hover,.back-btn:hover,.float-back:hover,.jump-back:hover,.collapse-toggle:hover{filter:brightness(1.18)}
.header-search{display:flex;gap:8px;justify-content:flex-end}.search-box{width:100%;height:52px;border-radius:9px;border:1px solid rgba(100,116,139,.35);background:rgba(13,27,44,.94);color:#fff;padding:0 16px;font-size:15px;outline:none}.search-box::placeholder{color:#90a0b8}.search-btn{width:56px;border:0;border-radius:9px;background:#2456e8;color:white;font-size:23px;cursor:pointer;transition:.16s}
.main-card,.detail-page{max-width:1500px;margin:0 auto}.panel{border:1px solid rgba(96,165,250,.22);background:rgba(8,18,32,.78);border-radius:20px;padding:22px 10px 10px;box-shadow:0 18px 60px rgba(0,0,0,.25)}.toolbar{display:flex;gap:22px;align-items:center;padding:0 20px 18px}.main-search-wrap{position:relative;flex:1;max-width:660px}.main-search-row,.recent-search-row{display:flex;gap:8px}.suggest-box{position:absolute;top:60px;left:0;right:64px;z-index:50;background:#081425;border:1px solid rgba(96,165,250,.32);border-radius:12px;overflow:hidden;display:none}.suggest-item{padding:13px 15px;color:#dbe7fb;cursor:pointer;border-bottom:1px solid rgba(71,85,105,.45)}.suggest-item:hover{background:rgba(37,99,235,.24)}
.filter-row,.recent-filter-row,.master-filter-row{display:flex;gap:10px;flex-wrap:wrap}.lane-filter,.recent-lane-filter,.master-filter{display:inline-flex;align-items:center;justify-content:center;gap:7px;min-height:46px;border-radius:999px;border:1px solid rgba(148,163,184,.25);background:rgba(22,36,54,.88);color:#fff;padding:0 18px;cursor:pointer;transition:.16s;white-space:nowrap}.lane-filter.active,.recent-lane-filter.active,.master-filter.active{background:#2456e8;border-color:#5ea0ff}.lane-icon{width:24px;height:24px;object-fit:contain;vertical-align:middle}.hide{display:none!important}
table{width:100%;border-collapse:separate;border-spacing:0 9px;table-layout:fixed}th{height:62px;background:rgba(18,33,51,.92);color:#cce0ff;font-size:14px;text-align:center;padding:8px}td{height:66px;background:linear-gradient(90deg,rgba(24,39,58,.96),rgba(22,36,54,.96));border-top:1px solid rgba(96,165,250,.12);border-bottom:1px solid rgba(0,0,0,.38);text-align:center;padding:9px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}th:first-child,td:first-child{border-radius:11px 0 0 11px}th:last-child,td:last-child{border-radius:0 11px 11px 0}.sort-btn{width:100%;border:0;border-radius:8px;background:rgba(37,99,235,.38);color:#dbeafe;padding:8px 4px;cursor:pointer;transition:.16s}.clickable-row,.clickable-cell{cursor:pointer;transition:.16s}.nickname{text-align:left}.player-name-cell,.champ-cell,.dual-cell{display:flex;align-items:center;gap:10px;min-width:0}.player-avatar,.champ-icon{width:46px;height:46px;border-radius:10px;object-fit:cover;border:1px solid rgba(255,255,255,.16);flex-shrink:0}.player-avatar{border-radius:50%}.name-main{display:block;overflow:hidden;text-overflow:ellipsis}.name-sub{display:block;color:#aebbd0;font-size:12px;margin-top:3px;overflow:hidden;text-overflow:ellipsis}.win{color:#5be079!important}.loss{color:#ff6666!important}.rate-high{color:#5be079!important}.rate-mid{color:#ffd85a!important}.rate-low{color:#ff7777!important}.result-block{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:8px;color:white}.result-win{background:#37a653}.result-loss{background:#d64242}
.tier-badge{display:inline-flex;align-items:center;justify-content:center;min-width:60px;height:34px;border-radius:999px;padding:0 13px;color:white;border:2px solid rgba(255,255,255,.25)}.tier-op{background:#b91c1c}.tier-s{background:#ea580c}.tier-a{background:#d6ae16;color:#111}.tier-b{background:#16a34a}.tier-c{background:#2563eb}.tier-red{box-shadow:0 0 16px rgba(239,68,68,.7);border-color:#fb7185!important}.tier-orange{box-shadow:0 0 16px rgba(249,115,22,.7);border-color:#fb923c!important}.tier-yellow{box-shadow:0 0 16px rgba(250,204,21,.7);border-color:#fde047!important}.tier-green{box-shadow:0 0 16px rgba(34,197,94,.7);border-color:#4ade80!important}.tier-blue{box-shadow:0 0 16px rgba(59,130,246,.7);border-color:#60a5fa!important}
.detail-page{display:none}.back-btn{border:1px solid rgba(148,163,184,.25);background:rgba(18,33,51,.95);color:#dbeafe;border-radius:10px;padding:10px 15px;margin-bottom:14px;cursor:pointer}.detail-hero{display:flex;align-items:center;gap:20px;border:1px solid rgba(96,165,250,.25);background:rgba(8,18,32,.86);border-radius:20px;padding:20px;margin-bottom:16px}.profile-box,.champ-icon.big{width:104px;height:104px;border-radius:20px;background:#020617;display:flex;align-items:center;justify-content:center;text-align:center;color:#94a3b8;overflow:hidden}.profile-box img{width:100%;height:100%;object-fit:cover}.hero-title{font-size:34px;margin-bottom:10px}.hero-sub{display:flex;gap:8px;flex-wrap:wrap}.lane-pill{display:inline-flex;align-items:center;gap:6px;padding:8px 11px;border-radius:999px;background:rgba(22,36,54,.95);border:1px solid rgba(148,163,184,.22);color:#dbeafe}
.section{border:1px solid rgba(96,165,250,.22);background:rgba(8,18,32,.82);border-radius:18px;padding:16px;margin-bottom:16px}.section-title{font-size:20px;color:#bfdbfe;margin-bottom:12px}.section-sub{font-size:12px;color:#94a3b8}.stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}.stat-card{background:rgba(22,36,54,.94);border:1px solid rgba(148,163,184,.22);border-radius:12px;padding:13px 10px;text-align:center;transition:.16s}.stat-card.clickable{cursor:pointer}.stat-label{font-size:13px;color:#cbd5e1;margin-bottom:6px}.stat-value{font-size:21px}.stat-extra{font-size:11px;color:#94a3b8;margin-top:5px}.record-panel{display:none;margin-top:12px;border:1px solid rgba(96,165,250,.26);border-radius:14px;background:rgba(2,6,23,.35);padding:12px}.record-panel.show{display:block}.record-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}.close-btn{border:0;background:#334155;color:#fff;border-radius:8px;padding:8px 12px;cursor:pointer}
.collapsible-header{display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;user-select:none}.collapse-toggle{border:1px solid rgba(96,165,250,.3);background:rgba(22,36,54,.94);color:#dbeafe;border-radius:999px;padding:8px 12px;cursor:pointer}.collapsible-content{max-height:0;opacity:0;overflow:hidden;transition:max-height .38s ease,opacity .24s ease,margin-top .38s ease}.collapsible-section.open .collapsible-content{max-height:6000px;opacity:1;margin-top:14px}
.recent-control-wrap{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:12px}.recent-search-wrap{position:relative;flex:1;min-width:260px}.recent-search-box{height:46px;border-radius:10px;border:1px solid rgba(100,116,139,.35);background:rgba(13,27,44,.94);color:#fff;padding:0 13px;outline:none;width:100%}.recent-search-btn{width:50px;border:0;border-radius:10px;background:#2456e8;color:#fff;font-size:18px;cursor:pointer}.recent-suggest-box{position:absolute;top:54px;left:0;right:58px;z-index:55;background:#081425;border:1px solid rgba(96,165,250,.32);border-radius:12px;overflow:hidden;display:none}.recent-table th{height:58px;font-size:13px}.recent-table td{height:72px;font-size:14px}.opponent-name{font-size:12px;color:#cbd5e1;display:block;margin-top:2px}.empty{color:#94a3b8;padding:18px;text-align:center}.jump-back{display:none;align-items:center;gap:8px;position:sticky;top:68px;z-index:20;margin-bottom:12px;border:1px solid rgba(96,165,250,.35);background:#1d4ed8;color:#fff;border-radius:999px;padding:10px 14px;cursor:pointer}.jump-back.show{display:inline-flex}
.float-bar{position:fixed;top:0;left:0;right:0;height:58px;background:rgba(8,18,32,.96);border-bottom:1px solid rgba(96,165,250,.22);backdrop-filter:blur(12px);display:flex;align-items:center;gap:12px;padding:0 22px;z-index:999;transform:translateY(-100%);opacity:0;transition:.22s;pointer-events:none}.float-bar.show{transform:translateY(0);opacity:1;pointer-events:auto}.float-back{width:38px;height:38px;border:0;border-radius:10px;background:#1f3550;color:#fff;font-size:20px;cursor:pointer}.float-title{font-size:22px}.col-rank{width:5%}.col-name{width:22%}.col-small{width:7%}.col-rate{width:8%}.col-tier{width:10%}.col-champ{width:25%}.col-lane{width:9%}.col-score{width:8%}.col-record-result{width:6%}.col-record-name{width:18%}
@media(max-width:1000px){.app-head{grid-template-columns:1fr}.top-tabs,.header-search{justify-content:center}.brand{order:-1}.stat-grid{grid-template-columns:repeat(3,1fr)}th,td{font-size:12px}.toolbar{flex-direction:column;align-items:stretch}.main-search-wrap{max-width:none}}@media(max-width:700px){body{padding:14px 8px}.brand h1{font-size:30px}.tab{min-width:0;flex:1}.stat-grid{grid-template-columns:repeat(2,1fr)}.detail-hero{align-items:flex-start}.profile-box,.champ-icon.big{width:78px;height:78px}.hero-title{font-size:25px}th,td{font-size:10px;padding:7px 4px}.player-avatar,.champ-icon{width:34px;height:34px}.recent-table th,.recent-table td{font-size:10px}}
</style>

<body>
<div id="floatBar" class="float-bar"><button class="float-back" onclick="goBack()">‹</button><div id="floatTitle" class="float-title"></div></div>

<header class="app-head">
  <div class="top-tabs">
    <button id="playerTab" class="tab active">플레이어</button>
    <button id="championTab" class="tab">챔피언</button>
  </div>
  <div class="brand">
    <h1>🏆 BANDLE.GG 🏆</h1>
    <div id="summary" class="summary">데이터 불러오는 중...</div>
  </div>
  <div class="header-search">
    <input id="headerSearchInput" class="search-box" placeholder="플레이어 이름 검색..." autocomplete="off">
    <button class="search-btn" onclick="runSearch(document.getElementById('headerSearchInput').value)">⌕</button>
  </div>
</header>

<main id="mainPage" class="main-card">
  <div class="panel">
    <div class="toolbar">
      <div class="main-search-wrap">
        <div class="main-search-row">
          <input id="searchInput" class="search-box" placeholder="플레이어 이름 검색..." autocomplete="off">
          <button id="searchBtn" class="search-btn">⌕</button>
        </div>
        <div id="suggestBox" class="suggest-box"></div>
      </div>
      <div id="laneFilters" class="filter-row"></div>
    </div>

    <table id="playerTable">
      <colgroup><col class="col-rank"><col class="col-name"><col class="col-small"><col class="col-small"><col class="col-small"><col class="col-rate"><col class="col-rate"><col class="col-rate"></colgroup>
      <thead><tr><th>순위</th><th><button class="sort-btn" onclick="sortPlayer('name')">플레이어</button></th><th><button class="sort-btn" onclick="sortPlayer('games')">판수</button></th><th><button class="sort-btn" onclick="sortPlayer('wins')">승</button></th><th><button class="sort-btn" onclick="sortPlayer('losses')">패</button></th><th><button class="sort-btn" onclick="sortPlayer('winRate')">승률</button></th><th><button class="sort-btn" onclick="sortPlayer('kp')">킬관여율</button></th><th><button class="sort-btn" onclick="sortPlayer('participation')">참여율</button></th></tr></thead>
      <tbody id="playerRanking"></tbody>
    </table>

    <table id="championTable" class="hide">
      <colgroup><col class="col-rank"><col class="col-tier"><col class="col-champ"><col class="col-lane"><col class="col-small"><col class="col-small"><col class="col-small"><col class="col-rate"><col class="col-rate"><col class="col-rate"><col class="col-rate"></colgroup>
      <thead><tr><th>순위</th><th><button class="sort-btn" onclick="sortChampion('tier')">티어</button></th><th><button class="sort-btn" onclick="sortChampion('name')">챔피언</button></th><th>라인</th><th><button class="sort-btn" onclick="sortChampion('games')">판수</button></th><th><button class="sort-btn" onclick="sortChampion('wins')">승</button></th><th><button class="sort-btn" onclick="sortChampion('losses')">패</button></th><th><button class="sort-btn" onclick="sortChampion('winRate')">승률</button></th><th><button class="sort-btn" onclick="sortChampion('pickRate')">픽률</button></th><th><button class="sort-btn" onclick="sortChampion('banRate')">밴율</button></th><th><button class="sort-btn" onclick="sortChampion('kp')">킬관여율</button></th></tr></thead>
      <tbody id="championRanking"></tbody>
    </table>
  </div>
</main>

<section id="detailPage" class="detail-page">
  <button class="back-btn" onclick="goBack()">← 뒤로가기</button>
  <div id="detailContent"></div>
</section>

<script type="module">
import{createClient}from"https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL="https://ehligpqxjczgcggjpzwn.supabase.co";
const SUPABASE_KEY="sb_publishable_QHDiR1qAWGVaKSDZguc0qg_fE_eVCwZ";
const supabase=createClient(SUPABASE_URL,SUPABASE_KEY);

const LANE_ORDER=["TOP","JUNGLE","MID","ADC","SUPPORT"];
const LANE_LABELS={ALL:"전체",TOP:"탑",JUNGLE:"정글",MID:"미드",ADC:"원딜",SUPPORT:"서폿"};
const LANE_ICON_URLS={
TOP:"https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/svg/position-top.svg",
JUNGLE:"https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/svg/position-jungle.svg",
MID:"https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/svg/position-middle.svg",
ADC:"https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/svg/position-bottom.svg",
SUPPORT:"https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/svg/position-utility.svg"};
const TIER_CLASS={OP:"tier-red",S:"tier-orange",A:"tier-yellow",B:"tier-green",C:"tier-blue"};

let players=[],rows=[],bans=[],matches=[],totalGames=0;
let currentTab="player",currentLane="ALL",activeSearch="";
let playerSort="winRate",playerAsc=false,championSort="tier",championAsc=true;
let mostSort="score",mostAsc=false,mostLane="ALL",masterSort="score",masterAsc=false,masterLane="ALL";
let recentLane="ALL",recentSearch="",latestVersion="15.12.1",championNameToId={};
let currentDetailKind="",currentDetailName="",jumpBackY=0;

const $=id=>document.getElementById(id);
const safe=v=>String(v??"").replaceAll("\\","\\\\").replaceAll("'","\\'").replaceAll('"',"&quot;");
const htmlSafe=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
const num=v=>Number(v)||0;
const pct=v=>isFinite(v)?`${v.toFixed(1)}%`:"0.0%";
const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
const rateClass=r=>r>=60?"rate-high":r>=50?"rate-mid":"rate-low";
const getKda=(k,d,a)=>d===0?k+a:(k+a)/d;
const kp=r=>num(r.team_kills)>0?(num(r.kills)+num(r.assists))/num(r.team_kills)*100:null;
const compareName=(a,b)=>String(a).localeCompare(String(b),"ko");
const laneIcon=l=>LANE_ICON_URLS[l]?`<img class="lane-icon" src="${LANE_ICON_URLS[l]}" alt="${LANE_LABELS[l]}">`:"";
const rankText=i=>i===1?"🥇":i===2?"🥈":i===3?"🥉":i;
const champImg=name=>championNameToId[name]?`https://ddragon.leagueoflegends.com/cdn/${latestVersion}/img/champion/${championNameToId[name]}.png`:"https://ddragon.leagueoflegends.com/cdn/15.12.1/img/profileicon/29.png";

$("playerTab").onclick=()=>switchTab("player");
$("championTab").onclick=()=>switchTab("champion");
$("searchInput").addEventListener("input",renderSuggestions);
$("searchInput").addEventListener("keydown",e=>{if(e.key==="Enter")runSearch($("searchInput").value)});
$("headerSearchInput").addEventListener("keydown",e=>{if(e.key==="Enter")runSearch($("headerSearchInput").value)});
$("searchBtn").onclick=()=>runSearch($("searchInput").value);

window.sortPlayer=type=>{if(playerSort===type)playerAsc=!playerAsc;else{playerSort=type;playerAsc=type==="name"}renderMain()};
window.sortChampion=type=>{if(championSort===type)championAsc=!championAsc;else{championSort=type;championAsc=type==="name"||type==="tier"}renderMain()};
window.setLane=lane=>{currentLane=lane;renderLaneFilters();renderMain()};
window.runSearch=runSearch;
window.openPlayerDetail=openPlayerDetail;
window.openChampionDetail=openChampionDetail;
window.goBack=goBack;
window.toggleCollapsible=id=>$(id)?.classList.toggle("open");
window.sortMost=(type,n)=>{if(mostSort===type)mostAsc=!mostAsc;else{mostSort=type;mostAsc=type==="name"}renderMostChampionArea(n)};
window.setMostLane=(lane,n)=>{mostLane=lane;renderMostChampionArea(n)};
window.sortMaster=(type,n)=>{if(masterSort===type)masterAsc=!masterAsc;else{masterSort=type;masterAsc=type==="name"}renderMasterRankingArea(n)};
window.setMasterLane=(lane,n)=>{masterLane=lane;renderMasterRankingArea(n)};
window.setRecentLane=setRecentLane;
window.runRecentSearch=runRecentSearch;
window.renderRecentSuggestions=renderRecentSuggestions;
window.jumpFromMost=jumpFromMost;
window.jumpFromMaster=jumpFromMaster;
window.jumpFromLaneStats=jumpFromLaneStats;
window.closeRecordPanel=closeRecordPanel;
window.showBestRecord=showBestRecord;
window.returnToJumpSource=returnToJumpSource;

async function loadChampionMeta(){
  try{
    const v=await fetch("https://ddragon.leagueoflegends.com/api/versions.json").then(r=>r.json());
    latestVersion=v[0]||latestVersion;
    const data=await fetch(`https://ddragon.leagueoflegends.com/cdn/${latestVersion}/data/ko_KR/champion.json`).then(r=>r.json());
    championNameToId={};
    Object.values(data.data).forEach(c=>championNameToId[c.name]=c.id);
  }catch(e){console.warn(e)}
}
async function loadData(){
  try{
    await loadChampionMeta();
    const{data:pData,error:pError}=await supabase.from("players").select("discord_id,lol_name,wins,losses,profile_image_url,profile_updated_at");
    const{data:rData,error:rError}=await supabase.from("match_players").select("id,match_id,created_at,lol_name,champion_name,lane,kills,deaths,assists,team_kills,win");
    const{data:bData,error:bError}=await supabase.from("match_bans").select("id,match_id,champion_name,team_id,created_at");
    const{data:mData,error:mError,count}=await supabase.from("matches").select("*",{count:"exact"});
    if(pError)throw pError;if(rError)throw rError;if(bError)throw bError;if(mError)throw mError;
    players=pData||[];rows=rData||[];bans=bData||[];matches=mData||[];totalGames=count||matches.length||0;
    $("summary").innerText=`총 판수: ${totalGames.toLocaleString()}판    멤버 수: ${players.length}명`;
    renderLaneFilters();renderMain();
    if(currentDetailKind==="player")renderRecentMatchArea(currentDetailName);
    if(currentDetailKind==="champion")renderChampionRecentMatchArea(currentDetailName);
  }catch(e){$("summary").innerText="데이터 로드 실패: "+(e.message||e)}
}

function switchTab(tab){
  currentTab=tab;activeSearch="";$("searchInput").value="";$("headerSearchInput").value="";
  $("playerTab").classList.toggle("active",tab==="player");$("championTab").classList.toggle("active",tab==="champion");
  $("playerTable").classList.toggle("hide",tab!=="player");$("championTable").classList.toggle("hide",tab!=="champion");
  $("searchInput").placeholder=tab==="player"?"플레이어 이름 검색...":"챔피언 이름 검색...";
  $("headerSearchInput").placeholder=$("searchInput").placeholder;
  renderLaneFilters();renderMain();
}
function runSearch(v){
  activeSearch=String(v||"").trim();
  $("searchInput").value=activeSearch;$("headerSearchInput").value=activeSearch;
  $("suggestBox").style.display="none";renderMain();
}
function renderSuggestions(){
  const q=$("searchInput").value.trim().toLowerCase();
  if(!q){$("suggestBox").style.display="none";return}
  let list=currentTab==="player"?players.map(p=>p.lol_name):[...new Set(rows.map(r=>r.champion_name).filter(Boolean))];
  list=list.filter(n=>String(n||"").toLowerCase().includes(q)).slice(0,8);
  $("suggestBox").innerHTML=list.map(n=>`<div class="suggest-item" onclick="runSearch('${safe(n)}')">${htmlSafe(n)}</div>`).join("");
  $("suggestBox").style.display=list.length?"block":"none";
}
function renderLaneFilters(){
  $("laneFilters").innerHTML=["ALL",...LANE_ORDER].map(l=>`<button class="lane-filter ${currentLane===l?"active":""}" onclick="setLane('${l}')">${l==="ALL"?"◎":laneIcon(l)} ${LANE_LABELS[l]}</button>`).join("");
}
function renderMain(){currentTab==="player"?renderPlayerRanking():renderChampionRanking()}

function renderMasterRankingArea(championName){
  const list=getMasterStats(championName);
  $("masterRankingArea").innerHTML=`<div class="master-filter-row" style="margin-bottom:12px">${["ALL",...LANE_ORDER].map(l=>`<button class="master-filter ${masterLane===l?"active":""}" onclick="setMasterLane('${l}','${safe(championName)}')">${l==="ALL"?"◎":laneIcon(l)} ${LANE_LABELS[l]}</button>`).join("")}</div>
  <table><thead><tr><th>순위</th><th><button class="sort-btn" onclick="sortMaster('name','${safe(championName)}')">플레이어 / 라인</button></th><th><button class="sort-btn" onclick="sortMaster('games','${safe(championName)}')">판수</button></th><th>승</th><th>패</th><th><button class="sort-btn" onclick="sortMaster('winRate','${safe(championName)}')">승률</button></th><th>KDA</th><th>킬관여율</th><th>점수</th></tr></thead><tbody>${list.map((p,i)=>`<tr><td>${rankText(i+1)}</td><td class="clickable-cell nickname" onclick="jumpFromMaster('${safe(championName)}','${safe(p.name)}','${p.lane}')"><div class="dual-cell"><span><span class="name-main">${htmlSafe(p.name)}</span><span class="name-sub">${laneIcon(p.lane)} ${LANE_LABELS[p.lane]}</span></span></div></td><td>${p.games}</td><td class="win">${p.wins}</td><td class="loss">${p.losses}</td><td class="${rateClass(p.winRate)}">${pct(p.winRate)}</td><td>${p.kda.toFixed(2)}</td><td>${pct(p.kp)}</td><td>${p.score.toFixed(1)}</td></tr>`).join("")||`<tr><td colspan="9">데이터가 없습니다.</td></tr>`}</tbody></table>`;
}

function recentControls(mode,name){
  const placeholder=mode==="player"?"챔피언 이름 검색...":"플레이어 이름 검색...";
  return`<button id="jumpBackBtn" class="jump-back" onclick="returnToJumpSource()">↑ 보던 위치로 돌아가기</button>
  <div class="recent-control-wrap"><div class="recent-search-wrap"><div class="recent-search-row"><input id="recentSearchInput" class="recent-search-box" value="${htmlSafe(recentSearch)}" placeholder="${placeholder}" oninput="renderRecentSuggestions('${mode}','${safe(name)}')" onkeydown="if(event.key==='Enter')runRecentSearch('${mode}','${safe(name)}',this.value)"><button class="recent-search-btn" onclick="runRecentSearch('${mode}','${safe(name)}',document.getElementById('recentSearchInput').value)">⌕</button></div><div id="recentSuggestBox" class="recent-suggest-box"></div></div><div class="recent-filter-row">${["ALL",...LANE_ORDER].map(l=>`<button class="recent-lane-filter ${recentLane===l?"active":""}" onclick="setRecentLane('${mode}','${safe(name)}','${l}')">${l==="ALL"?"◎":laneIcon(l)} ${LANE_LABELS[l]}</button>`).join("")}</div></div><div id="${mode==="player"?"recentMatchArea":"championRecentMatchArea"}"></div>`;
}
function setRecentLane(mode,name,lane){recentLane=lane;refreshRecent(mode,name)}
function runRecentSearch(mode,name,v){recentSearch=String(v||"").trim();refreshRecent(mode,name)}
function refreshRecent(mode,name){
  const sec=$(mode==="player"?"recentMatchSection":"championRecentMatchSection");sec.classList.add("open");sec.querySelector(".collapsible-content").innerHTML=recentControls(mode,name);
  mode==="player"?renderRecentMatchArea(name):renderChampionRecentMatchArea(name);
  if(jumpBackY)$("jumpBackBtn")?.classList.add("show");
}
function renderRecentSuggestions(mode,name){
  const input=$("recentSearchInput"),box=$("recentSuggestBox");if(!input||!box)return;
  const q=input.value.trim().toLowerCase();if(!q){box.style.display="none";return}
  const base=mode==="player"?rows.filter(r=>r.lol_name===name).map(r=>r.champion_name):rows.filter(r=>r.champion_name===name).map(r=>r.lol_name);
  const list=[...new Set(base.filter(Boolean))].filter(n=>n.toLowerCase().includes(q)).slice(0,8);
  box.innerHTML=list.map(n=>`<div class="suggest-item" onclick="runRecentSearch('${mode}','${safe(name)}','${safe(n)}')">${htmlSafe(n)}</div>`).join("");
  box.style.display=list.length?"block":"none";
}
function jumpToRecent(mode,name,lane,search){
  jumpBackY=window.scrollY;recentLane=lane||"ALL";recentSearch=search||"";refreshRecent(mode,name);
  setTimeout(()=>$(mode==="player"?"recentMatchSection":"championRecentMatchSection")?.scrollIntoView({behavior:"smooth",block:"start"}),40);
}
function returnToJumpSource(){window.scrollTo({top:jumpBackY,behavior:"smooth"})}
function jumpFromMost(playerName,champion,lane){jumpToRecent("player",playerName,lane,champion)}
function jumpFromMaster(championName,player,lane){jumpToRecent("champion",championName,lane,player)}
function jumpFromLaneStats(mode,owner,lane){jumpToRecent(mode,owner,lane,"")}

function findOpponent(row){
  const same=rows.filter(r=>r.match_id===row.match_id&&r.lol_name!==row.lol_name);
  return same.find(r=>r.lane===row.lane&&r.win!==row.win)||same.find(r=>r.lane===row.lane)||null;
}
function recentMatchScore(r){const k=num(r.kills),d=num(r.deaths),a=num(r.assists),kda=getKda(k,d,a),kpp=kp(r)||0;return k*3+a*2-d*2+kda*4+kpp*.25+(r.win?12:0)}
function recentTableRows(data,mode){
  if(!data.length)return`<div class="empty">조건에 맞는 전적이 없습니다.</div>`;
  return`<table class="detail-table recent-table"><colgroup><col class="col-record-result"><col class="col-record-name"><col class="col-lane"><col class="col-small"><col class="col-small"><col class="col-rate"><col class="col-score"><col class="col-record-name"><col class="col-lane"><col class="col-small"><col class="col-small"><col class="col-rate"><col class="col-score"></colgroup><thead><tr><th>승패</th><th>챔피언 / 플레이어</th><th>라인</th><th>K/D/A</th><th>KDA</th><th>킬관여율</th><th>점수</th><th>상대 챔프</th><th>상대 라인</th><th>상대 K/D/A</th><th>상대 KDA</th><th>상대 킬관여율</th><th>상대 점수</th></tr></thead><tbody>${data.map(r=>{const o=findOpponent(r),k=num(r.kills),d=num(r.deaths),a=num(r.assists),kda=getKda(k,d,a),kpp=kp(r),score=recentMatchScore(r),ok=o?num(o.kills):0,od=o?num(o.deaths):0,oa=o?num(o.assists):0,okda=o?getKda(ok,od,oa):0,okp=o?kp(o):null,os=o?recentMatchScore(o):0;return`<tr><td><span class="result-block ${r.win?"result-win":"result-loss"}">${r.win?"승":"패"}</span></td><td class="nickname"><div class="champ-cell"><img class="champ-icon" src="${champImg(r.champion_name)}"><span><span class="name-main">${htmlSafe(r.champion_name||"-")}</span><span class="name-sub">${htmlSafe(r.lol_name||"-")}</span></span></div></td><td>${laneIcon(r.lane)} ${LANE_LABELS[r.lane]||r.lane||"-"}</td><td>${k}/${d}/${a}</td><td>${kda.toFixed(2)}</td><td>${kpp===null?"-":pct(kpp)}</td><td>${score.toFixed(1)}</td><td class="nickname">${o?`<div class="champ-cell"><img class="champ-icon" src="${champImg(o.champion_name)}"><span><span class="name-main">${htmlSafe(o.champion_name||"-")}</span><span class="name-sub">${htmlSafe(o.lol_name||"-")}</span></span></div>`:"-"}</td><td>${o?`${laneIcon(o.lane)} ${LANE_LABELS[o.lane]||o.lane||"-"}`:"-"}</td><td>${o?`${ok}/${od}/${oa}`:"-"}</td><td>${o?okda.toFixed(2):"-"}</td><td>${o?(okp===null?"-":pct(okp)):"-"}</td><td>${o?os.toFixed(1):"-"}</td></tr>`}).join("")}</tbody></table>`;
}
function renderRecentMatchArea(playerName){
  let d=rows.filter(r=>r.lol_name===playerName);if(recentLane!=="ALL")d=d.filter(r=>r.lane===recentLane);if(recentSearch)d=d.filter(r=>(r.champion_name||"").toLowerCase().includes(recentSearch.toLowerCase()));
  d=d.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));$("recentMatchArea").innerHTML=recentTableRows(d,"player");
}
function renderChampionRecentMatchArea(championName){
  let d=rows.filter(r=>r.champion_name===championName);if(recentLane!=="ALL")d=d.filter(r=>r.lane===recentLane);if(recentSearch)d=d.filter(r=>(r.lol_name||"").toLowerCase().includes(recentSearch.toLowerCase()));
  d=d.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));$("championRecentMatchArea").innerHTML=recentTableRows(d,"champion");
}

loadData();
setInterval(loadData,30000);
</script>
</body>
</html>
