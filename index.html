<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🏆 BANDLE.GG 🏆</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:"맑은 고딕","Malgun Gothic",Arial,sans-serif;background:radial-gradient(circle at left,rgba(15,23,42,.55),transparent 28%),radial-gradient(circle at right,rgba(15,23,42,.55),transparent 28%),linear-gradient(90deg,#111827,#1e293b 18%,#1e293b 82%,#111827);color:white;padding:38px;min-height:100vh;font-weight:800}
h1{text-align:center;font-size:42px;margin:0 0 12px;font-weight:1000}
.summary{text-align:center;margin-bottom:20px;color:#cbd5e1;font-size:17px;font-weight:900}
.top-tabs{display:flex;justify-content:center;gap:12px;margin-bottom:18px}
.tab{padding:12px 34px;border-radius:14px;border:none;color:white;font-size:17px;font-weight:1000;cursor:pointer;background:#4b5563;filter:grayscale(100%)}
.tab.active{background:#dc2626;filter:grayscale(0)}
.search-wrap{position:relative;max-width:900px;margin:0 auto 18px}
.search-row{display:flex;gap:8px}
.search-box{width:100%;padding:15px 16px;border-radius:14px;border:1px solid #334155;background:rgba(30,41,59,.95);color:white;font-size:16px;outline:none;font-weight:900}
.search-btn{width:58px;border:none;border-radius:14px;background:#2563eb;color:white;font-size:22px;cursor:pointer;font-weight:1000}
.suggest-box{position:absolute;top:58px;left:0;right:66px;background:rgba(15,23,42,.98);border:1px solid rgba(96,165,250,.35);border-radius:14px;overflow:hidden;z-index:20;display:none}
.suggest-item{padding:13px 16px;cursor:pointer;color:#e5e7eb;border-bottom:1px solid rgba(51,65,85,.7);font-weight:900}
.suggest-item:hover{background:rgba(59,130,246,.22)}
.filter-row{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-bottom:22px}
.lane-filter{display:flex;align-items:center;gap:7px;border:1px solid rgba(148,163,184,.25);background:rgba(30,41,59,.92);color:white;padding:10px 16px;border-radius:999px;font-weight:1000;cursor:pointer}
.lane-filter.active{background:#2563eb;border-color:#60a5fa}
.lane-icon{width:23px;height:23px;object-fit:contain}
.main-card,.detail-page{max-width:1380px;margin:0 auto}
table{width:100%;border-collapse:separate;border-spacing:0 10px;table-layout:fixed}
th{padding:10px 5px;background:rgba(51,65,85,.95);color:#93c5fd;text-align:center;font-weight:1000;white-space:nowrap}
td{padding:14px 7px;text-align:center;background:rgba(51,65,85,.88);border-bottom:1px solid rgba(71,85,105,.55);vertical-align:middle;font-weight:900;color:#f8fafc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
th:first-child,td:first-child{border-radius:14px 0 0 14px}
th:last-child,td:last-child{border-radius:0 14px 14px 0}
tbody tr:hover td{background:rgba(71,85,105,.95)}
.sort-btn{border:none;border-radius:10px;padding:8px 8px;background:rgba(30,64,175,.78);color:#dbeafe;cursor:pointer;font-weight:1000;width:100%;font-family:"맑은 고딕","Malgun Gothic",Arial,sans-serif}
.sort-btn:hover{background:#1d4ed8;color:white}
.clickable-row{cursor:pointer}
.nickname{font-weight:1000;color:white}
.win{color:#22c55e!important;font-weight:1000}.loss{color:#ef4444!important;font-weight:1000}
.rate-high{color:#22c55e!important;font-weight:1000}.rate-mid{color:#facc15!important;font-weight:1000}.rate-low{color:#f87171!important;font-weight:1000}
.low-participation td{color:#cbd5e1!important;filter:grayscale(70%)}
.group-divider td{height:18px;padding:0!important;background:transparent!important;border-bottom:2px solid rgba(147,197,253,.5);border-radius:0!important}
.champ-cell{display:flex;align-items:center;justify-content:flex-start;gap:12px;min-width:0;overflow:hidden}
.champ-cell span,.champ-name{font-weight:1000;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.champ-icon{width:44px;height:44px;border-radius:10px;border:2px solid #334155;object-fit:cover;flex-shrink:0}
.champ-icon.big{width:112px;height:112px;border-radius:24px}
.tier-red{border-color:#ff334e!important;box-shadow:0 0 18px rgba(239,68,68,.65),inset 0 0 10px rgba(255,255,255,.18)}
.tier-orange{border-color:#ff8a1c!important;box-shadow:0 0 18px rgba(249,115,22,.6),inset 0 0 10px rgba(255,255,255,.16)}
.tier-yellow{border-color:#ffe14d!important;box-shadow:0 0 18px rgba(250,204,21,.55),inset 0 0 10px rgba(255,255,255,.14)}
.tier-green{border-color:#31e981!important;box-shadow:0 0 18px rgba(34,197,94,.55),inset 0 0 10px rgba(255,255,255,.13)}
.tier-blue{border-color:#60a5fa!important;box-shadow:0 0 18px rgba(59,130,246,.55),inset 0 0 10px rgba(255,255,255,.12)}
.tier-badge{display:inline-flex;align-items:center;justify-content:center;min-width:70px;padding:7px 12px;border-radius:999px;font-weight:1000;color:white;letter-spacing:-.5px;border:1px solid rgba(255,255,255,.22);box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 7px 18px rgba(0,0,0,.25)}
.tier-badge.tier-1{background:linear-gradient(135deg,#7f1d1d,#ef4444,#fb7185)}
.tier-badge.tier-2{background:linear-gradient(135deg,#7c2d12,#f97316,#fdba74)}
.tier-badge.tier-3{background:linear-gradient(135deg,#713f12,#eab308,#fde047);color:#111827}
.tier-badge.tier-4{background:linear-gradient(135deg,#14532d,#22c55e,#86efac);color:#06210f}
.tier-badge.tier-5{background:linear-gradient(135deg,#1e3a8a,#3b82f6,#93c5fd)}
.back-btn{border:none;background:rgba(30,41,59,.85);color:#cbd5e1;border-radius:12px;padding:9px 14px;font-weight:1000;cursor:pointer;margin-bottom:18px}
.detail-page{display:none}
.detail-hero{background:rgba(15,23,42,.92);border:1px solid rgba(96,165,250,.35);border-radius:22px;padding:22px;display:flex;align-items:center;gap:20px;margin-bottom:18px}
.profile-box{width:106px;height:106px;border-radius:22px;background:#020617;border:1px solid rgba(148,163,184,.25);display:flex;align-items:center;justify-content:center;text-align:center;color:#94a3b8;font-size:12px;font-weight:1000;overflow:hidden;flex-shrink:0}
.profile-box img{width:100%;height:100%;object-fit:cover}
.hero-title{font-size:34px;font-weight:1000;margin-bottom:10px}
.hero-sub{display:flex;gap:8px;flex-wrap:wrap}
.lane-pill{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:rgba(30,41,59,.95);border:1px solid rgba(148,163,184,.25);font-weight:1000;color:#dbeafe}
.section{background:rgba(15,23,42,.92);border:1px solid rgba(96,165,250,.26);border-radius:22px;padding:18px;margin-bottom:18px}
.section-title{font-size:20px;font-weight:1000;color:#bfdbfe;margin-bottom:14px}
.stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.stat-card{background:rgba(30,41,59,.95);border:1px solid rgba(148,163,184,.25);border-radius:15px;padding:14px 10px;text-align:center}
.stat-label{color:#cbd5e1;font-size:13px;margin-bottom:6px;font-weight:1000}
.stat-value{font-size:21px;font-weight:1000}
.record-blocks{display:flex;gap:0;flex-wrap:wrap}
.result-block{width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:white;font-weight:1000;border-right:1px solid rgba(15,23,42,.45)}
.result-block:first-child{border-radius:12px 0 0 12px}
.result-block:last-child{border-radius:0 12px 12px 0;border-right:none}
.result-win{background:#22c55e}.result-loss{background:#ef4444}
.lane-ratio-row{margin-bottom:12px}
.ratio-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-weight:1000}
.ratio-bar-bg{background:rgba(30,41,59,.95);height:15px;border-radius:999px;overflow:hidden}
.ratio-bar{height:100%;background:#2563eb;border-radius:999px}
.detail-table{width:100%;border-spacing:0 8px;table-layout:fixed}
.detail-table th,.detail-table td{font-size:13px;font-weight:1000}
.detail-table th{background:rgba(30,41,59,.95)}
.detail-table td{background:rgba(51,65,85,.82)}
.record-icons{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px}
.small-champ-icon{width:28px;height:28px;border-radius:8px;object-fit:cover}
.master-filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.master-filter{border:none;border-radius:999px;padding:8px 12px;background:rgba(30,41,59,.95);color:white;font-weight:1000;cursor:pointer}
.master-filter.active{background:#2563eb}
.hide{display:none!important}
.col-rank{width:54px}
.col-tier{width:92px}
.col-small{width:70px}
.col-rate{width:92px}
.col-name{width:150px}
.col-champ{width:210px}
.col-lane{width:72px}
.col-score{width:82px}
.col-auto{width:auto}
@media(max-width:850px){body{padding:20px}h1{font-size:30px}.stat-grid{grid-template-columns:repeat(2,1fr)}th,td{font-size:12px;padding:9px 5px}.detail-hero{align-items:flex-start}}
</style>
</head>

<body>
<h1>🏆 BANDLE.GG 🏆</h1>

<div class="top-tabs">
  <button id="playerTab" class="tab active">플레이어</button>
  <button id="championTab" class="tab">챔피언</button>
</div>

<div class="summary" id="summary">데이터 불러오는 중...</div>

<div id="mainPage" class="main-card">
  <div class="search-wrap">
    <div class="search-row">
      <input id="searchInput" class="search-box" type="text" placeholder="검색어 입력..." autocomplete="off" />
      <button id="searchBtn" class="search-btn">🔍</button>
    </div>
    <div id="suggestBox" class="suggest-box"></div>
  </div>

  <div id="laneFilters" class="filter-row"></div>

  <table id="playerTable">
    <colgroup><col class="col-lane"><col class="col-auto"><col class="col-auto"><col class="col-auto"><col class="col-auto"><col class="col-auto"><col class="col-auto"><col class="col-auto"><col class="col-auto"><col class="col-auto"></colgroup>
    <thead>
      <tr>
        <th>순위</th>
        <th><button class="sort-btn" onclick="sortPlayer('name')">닉네임</button></th>
        <th><button class="sort-btn" onclick="sortPlayer('games')">판수</button></th>
        <th><button class="sort-btn" onclick="sortPlayer('wins')">승</button></th>
        <th><button class="sort-btn" onclick="sortPlayer('losses')">패</button></th>
        <th><button class="sort-btn" onclick="sortPlayer('winRate')">승률</button></th>
        <th><button class="sort-btn" onclick="sortPlayer('participation')">참여율</button></th>
        <th><button class="sort-btn" onclick="sortPlayer('kp')">킬관여율</button></th>
      </tr>
    </thead>
    <tbody id="playerRanking"></tbody>
  </table>

  <table id="championTable" class="hide">
    <colgroup>
      <col class="col-rank"><col class="col-tier"><col class="col-champ"><col class="col-small"><col class="col-small"><col class="col-small"><col class="col-rate"><col class="col-rate"><col class="col-rate"><col class="col-rate">
    </colgroup>
    <thead>
      <tr>
        <th>순위</th>
        <th><button class="sort-btn" onclick="sortChampion('tier')">티어</button></th>
        <th><button class="sort-btn" onclick="sortChampion('name')">챔피언</button></th>
        <th><button class="sort-btn" onclick="sortChampion('games')">판수</button></th>
        <th><button class="sort-btn" onclick="sortChampion('wins')">승</button></th>
        <th><button class="sort-btn" onclick="sortChampion('losses')">패</button></th>
        <th><button class="sort-btn" onclick="sortChampion('winRate')">승률</button></th>
        <th><button class="sort-btn" onclick="sortChampion('pickRate')">픽률</button></th>
        <th><button class="sort-btn" onclick="sortChampion('banRate')">밴율</button></th>
        <th><button class="sort-btn" onclick="sortChampion('kp')">킬관여율</button></th>
      </tr>
    </thead>
    <tbody id="championRanking"></tbody>
  </table>
</div>

<div id="detailPage" class="detail-page">
  <button class="back-btn" onclick="goBack()">← 뒤로가기</button>
  <div id="detailContent"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL="https://ehligpqxjczgcggjpzwn.supabase.co";
const SUPABASE_KEY="sb_publishable_QHDiR1qAWGVaKSDZguc0qg_fE_eVCwZ";
const supabase=createClient(SUPABASE_URL,SUPABASE_KEY);

const LANE_ORDER=["TOP","JUNGLE","MID","ADC","SUPPORT"];
const LANE_LABELS={ALL:"전체",TOP:"탑",JUNGLE:"정글",MID:"미드",ADC:"원딜",SUPPORT:"서폿"};
const LANE_ICON_URLS={
  TOP:"https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/svg/position-top.svg",
  JUNGLE:"https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/svg/position-jungle.svg",
  MID:"https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/svg/position-middle.svg",
  ADC:"https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/svg/position-bottom.svg",
  SUPPORT:"https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/svg/position-utility.svg"
};
const TIER_CLASS={1:"tier-red",2:"tier-orange",3:"tier-yellow",4:"tier-green",5:"tier-blue"};

let players=[],rows=[],bans=[],matches=[],totalGames=0;
let currentTab="player",currentLane="ALL",activeSearch="";
let playerSort="winRate",playerAsc=false,championSort="tier",championAsc=true,mostSort="score",mostAsc=false,masterSort="score",masterAsc=false,masterLane="ALL";
let latestVersion="15.12.1",championNameToId={};

const playerTab=document.getElementById("playerTab");
const championTab=document.getElementById("championTab");
const searchInput=document.getElementById("searchInput");
const searchBtn=document.getElementById("searchBtn");
const suggestBox=document.getElementById("suggestBox");

playerTab.onclick=()=>{currentTab="player";activeSearch="";searchInput.value="";playerTab.classList.add("active");championTab.classList.remove("active");document.getElementById("playerTable").classList.remove("hide");document.getElementById("championTable").classList.add("hide");renderLaneFilters();renderMain()};
championTab.onclick=()=>{currentTab="champion";activeSearch="";searchInput.value="";championTab.classList.add("active");playerTab.classList.remove("active");document.getElementById("championTable").classList.remove("hide");document.getElementById("playerTable").classList.add("hide");renderLaneFilters();renderMain()};
searchInput.addEventListener("input",renderSuggestions);
searchInput.addEventListener("keydown",e=>{if(e.key==="Enter")runSearch(searchInput.value.trim())});
searchBtn.onclick=()=>runSearch(searchInput.value.trim());

window.sortPlayer=function(type){if(playerSort===type)playerAsc=!playerAsc;else{playerSort=type;playerAsc=type==="name"}renderMain()};
window.sortChampion=function(type){if(championSort===type)championAsc=!championAsc;else{championSort=type;championAsc=type==="name"||type==="tier"}renderMain()};
window.sortMost=function(type,playerName){if(mostSort===type)mostAsc=!mostAsc;else{mostSort=type;mostAsc=type==="name"}renderMostChampionArea(playerName)};
window.sortMaster=function(type,championName){if(masterSort===type)masterAsc=!masterAsc;else{masterSort=type;masterAsc=type==="name"}renderMasterRankingArea(championName)};
window.setMasterLane=function(lane,championName){masterLane=lane;renderMasterRankingArea(championName)};
window.openPlayerDetail=openPlayerDetail;
window.openChampionDetail=openChampionDetail;
window.goBack=goBack;
window.runSearch=runSearch;

async function loadChampionMeta(){
  try{
    const versionRes=await fetch("https://ddragon.leagueoflegends.com/api/versions.json");
    const versions=await versionRes.json();
    latestVersion=versions[0];
    const champRes=await fetch(`https://ddragon.leagueoflegends.com/cdn/${latestVersion}/data/ko_KR/champion.json`);
    const champJson=await champRes.json();
    championNameToId={};
    Object.values(champJson.data).forEach(champ=>{championNameToId[champ.name]=champ.id});
  }catch(e){console.error("챔피언 메타 로드 실패:",e)}
}

function champImg(name){const id=championNameToId[name];if(!id)return"";return`https://ddragon.leagueoflegends.com/cdn/${latestVersion}/img/champion/${id}.png`}
function laneIcon(lane){if(!LANE_ICON_URLS[lane])return"";return`<img class="lane-icon" src="${LANE_ICON_URLS[lane]}" onerror="this.style.display='none'" />`}
function lanePill(lane){return`<span class="lane-pill">${laneIcon(lane)} ${LANE_LABELS[lane]||lane}</span>`}
function safe(value){return String(value??"").replaceAll("\\","\\\\").replaceAll("'","\\'").replaceAll('"',"&quot;")}
function num(v){return Number(v)||0}
function pct(v){if(!isFinite(v))return"0.0%";return`${v.toFixed(1)}%`}
function rateClass(rate){if(rate>=60)return"rate-high";if(rate>=50)return"rate-mid";return"rate-low"}
function getKda(k,d,a){return d===0?k+a:(k+a)/d}
function kp(row){const teamKills=num(row.team_kills);if(teamKills<=0)return null;return(num(row.kills)+num(row.assists))/teamKills*100}
function average(arr){if(!arr.length)return 0;return arr.reduce((a,b)=>a+b,0)/arr.length}
function rankText(rank){if(rank===1)return"🥇";if(rank===2)return"🥈";if(rank===3)return"🥉";return rank}
function compareName(a,b){return String(a).localeCompare(String(b),"ko")}
function effectiveLane(){return activeSearch?"ALL":currentLane}
function getParticipationGroup(participation){if(participation>=35)return 0;if(participation>=10)return 1;return 2}
function tierBadge(tier){return`<span class="tier-badge tier-${tier}">${tier}티어</span>`}

function getChampionTier(champ){
  const score=
    champ.winRate*.42+
    champ.pickRate*1.15+
    champ.banRate*.75+
    champ.kp*.10+
    Math.min(champ.games,25)*1.05;

  if(champ.games<2&&champ.banRate<5)return 5;
  if(score>=82)return 1;
  if(score>=66)return 2;
  if(score>=50)return 3;
  if(score>=34)return 4;
  return 5;
}

async function loadData(){
  await loadChampionMeta();
  const {data:pData}=await supabase.from("players").select("discord_id,lol_name,wins,losses,profile_image_url,profile_updated_at");
  const {data:rData}=await supabase.from("match_players").select("id,match_id,created_at,lol_name,champion_name,lane,kills,deaths,assists,team_kills,win");
  const {data:bData}=await supabase.from("match_bans").select("id,match_id,champion_name,team_id,created_at");
  const {data:mData,count}=await supabase.from("matches").select("*",{count:"exact"});
  players=pData||[];
  rows=rData||[];
  bans=bData||[];
  matches=mData||[];
  totalGames=count||matches.length||0;
  document.getElementById("summary").innerText=`총 판수: ${totalGames}판 ㅣ 멤버 수: ${players.length}명`;
  renderLaneFilters();
  renderMain();
}

function renderLaneFilters(){
  const box=document.getElementById("laneFilters");
  const lanes=["ALL",...LANE_ORDER];
  box.innerHTML=lanes.map(lane=>`
    <button class="lane-filter ${currentLane===lane?"active":""}" onclick="setLane('${lane}')">
      ${lane==="ALL"?"":laneIcon(lane)}
      <span>${LANE_LABELS[lane]}</span>
    </button>
  `).join("");
}

window.setLane=function(lane){currentLane=lane;activeSearch="";searchInput.value="";renderLaneFilters();renderMain()};

function renderSuggestions(){
  const q=searchInput.value.trim().toLowerCase();
  if(!q){suggestBox.style.display="none";suggestBox.innerHTML="";return}
  let list=[];
  if(currentTab==="player"){
    list=players.map(p=>p.lol_name).filter(name=>name.toLowerCase().includes(q));
  }else{
    list=[...new Set(rows.map(r=>r.champion_name).filter(Boolean))].filter(name=>name.toLowerCase().includes(q));
  }
  list=list.slice(0,8);
  if(!list.length){suggestBox.style.display="none";return}
  suggestBox.innerHTML=list.map(item=>`<div class="suggest-item" onclick="runSearch('${safe(item)}')">${item}</div>`).join("");
  suggestBox.style.display="block";
}

function runSearch(value){activeSearch=value.trim();searchInput.value=activeSearch;suggestBox.style.display="none";renderMain()}

function calcPlayerStats(playerName,lane="ALL"){
  let data=rows.filter(r=>r.lol_name===playerName);
  if(lane!=="ALL")data=data.filter(r=>r.lane===lane);
  const games=data.length,wins=data.filter(r=>r.win).length,losses=games-wins;
  const winRate=games?wins/games*100:0,participation=totalGames?games/totalGames*100:0;
  const kills=data.reduce((s,r)=>s+num(r.kills),0),deaths=data.reduce((s,r)=>s+num(r.deaths),0),assists=data.reduce((s,r)=>s+num(r.assists),0);
  const kpList=data.map(kp).filter(v=>v!==null);
  return{name:playerName,games,wins,losses,winRate,participation,avgKills:games?kills/games:0,avgDeaths:games?deaths/games:0,avgAssists:games?assists/games:0,kda:getKda(kills,deaths,assists),kp:average(kpList),rows:data};
}

function getPlayerRanking(){
  const lane=effectiveLane();
  let list=players.map(p=>({...calcPlayerStats(p.lol_name,lane),profile_image_url:p.profile_image_url||""}));
  if(lane!=="ALL")list=list.filter(p=>p.games>0);
  if(activeSearch){const q=activeSearch.toLowerCase();list=list.filter(p=>p.name.toLowerCase().includes(q))}
  list.sort((a,b)=>{
    if(playerSort==="winRate"&&!activeSearch){
      const ga=getParticipationGroup(a.participation),gb=getParticipationGroup(b.participation);
      if(ga!==gb)return ga-gb;
      return playerAsc?a.winRate-b.winRate:b.winRate-a.winRate;
    }

function calcChampionStats(championName,lane="ALL"){
  let data=rows.filter(r=>r.champion_name===championName);
  if(lane!=="ALL")data=data.filter(r=>r.lane===lane);
  const games=data.length,wins=data.filter(r=>r.win).length,losses=games-wins;
  const winRate=games?wins/games*100:0,pickRate=totalGames?games/totalGames*100:0;
  const banCount=bans.filter(b=>b.champion_name===championName).length;
  const banRate=totalGames?banCount/totalGames*100:0;
  const kills=data.reduce((s,r)=>s+num(r.kills),0),deaths=data.reduce((s,r)=>s+num(r.deaths),0),assists=data.reduce((s,r)=>s+num(r.assists),0);
  const kpList=data.map(kp).filter(v=>v!==null);
  const stat={name:championName,games,wins,losses,winRate,pickRate,banRate,avgKills:games?kills/games:0,avgDeaths:games?deaths/games:0,avgAssists:games?assists/games:0,kda:getKda(kills,deaths,assists),kp:average(kpList),rows:data};
  stat.tier=getChampionTier(stat);
  return stat;
}

function getChampionRanking(){
  const lane=effectiveLane();
  let names=[...new Set([...rows.map(r=>r.champion_name).filter(Boolean),...bans.map(b=>b.champion_name).filter(Boolean)])];
  let list=names.map(name=>calcChampionStats(name,lane));

  list.sort((a,b)=>{

    if(championSort==="tier")result=a.tier-b.tier||b.games-a.games||b.winRate-a.winRate;
    else if(championSort==="name")result=compareName(a.name,b.name);

function statCards(items){
  return`<div class="stat-grid">${items.map(item=>`<div class="stat-card"><div class="stat-label">${item.label}</div><div class="stat-value ${item.cls||""}">${item.value}</div>${item.extra||""}</div>`).join("")}</div>`;
}

function recentBlocks(data){
  const recent=[...data].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,10);
  if(!recent.length)return"최근 전적 없음";
  return`<div class="record-blocks">${recent.map(r=>`<div class="result-block ${r.win?"result-win":"result-loss"}" title="${r.champion_name||""} / ${LANE_LABELS[r.lane]||r.lane||""}">${r.win?"승":"패"}</div>`).join("")}</div>`;
}

function streaks(data){
  const sorted=[...data].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  let maxWin=0,maxLose=0,curWin=0,curLose=0;
  sorted.forEach(r=>{
    if(r.win){curWin++;curLose=0}else{curLose++;curWin=0}
    maxWin=Math.max(maxWin,curWin);
    maxLose=Math.max(maxLose,curLose);
  });
  return{maxWin,maxLose};
}

function bestRecord(data,field){
  if(!data.length)return null;
  return[...data].sort((a,b)=>{
    const av=field==="kp"?(kp(a)??-1):num(a[field]);
    const bv=field==="kp"?(kp(b)??-1):num(b[field]);
    return bv-av;
  })[0];
}

      {label:"판수",value:s.games},{label:"승",value:s.wins,cls:"win"},{label:"패",value:s.losses,cls:"loss"},{label:"승률",value:pct(s.winRate),cls:rateClass(s.winRate)},{label:"픽률",value:pct(s.pickRate)},{label:"밴율",value:pct(s.banRate)},{label:"평균 킬",value:s.avgKills.toFixed(1)},{label:"평균 데스",value:s.avgDeaths.toFixed(1)},{label:"평균 어시",value:s.avgAssists.toFixed(1)},{label:"KDA",value:s.kda.toFixed(2)},{label:"평균 킬관여율",value:pct(s.kp)},{label:"티어",value:`${s.tier}티어`}
    ])}</div>
    <div class="section"><div class="section-title">최고 기록</div>${statCards([
      {label:"최다 킬",value:bestKill?`${num(bestKill.kills)}회`:"-",extra:championRecordExtra(bestKill)},{label:"최다 데스",value:bestDeath?`${num(bestDeath.deaths)}회`:"-",extra:championRecordExtra(bestDeath)},{label:"최다 어시스트",value:bestAssist?`${num(bestAssist.assists)}회`:"-",extra:championRecordExtra(bestAssist)}
    ])}</div>
    <div class="section"><div class="section-title">최근 기록 10판</div>${recentBlocks(data)}</div>
    <div class="section"><div class="section-title">라인 비율</div>${laneRatio(data)}</div>
    <div class="section"><div class="section-title">라인별 통계</div>${tableStatsRows(getChampionLaneStats(championName),"라인")}</div>
    <div class="section"><div class="section-title">${championName} 장인 랭킹</div><div id="masterRankingArea"></div></div>`;
  showDetail(html);
  renderMasterRankingArea(championName);
}

loadData();
setInterval(loadData,30000);
</script>
</body>
</html>
