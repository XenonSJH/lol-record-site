<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내전 전적표</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      padding: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1f2937;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 14px;
      text-align: center;
      border-bottom: 1px solid #374151;
    }

    th {
      background: #374151;
      cursor: pointer;
      user-select: none;
    }

    tr:hover {
      background: #2d3748;
    }
  </style>
</head>

<body>
  <h1>내전 전적표</h1>

  <table>
    <thead>
      <tr>
        <th>순위</th>
        <th>닉네임</th>
        <th onclick="sortBy('games')">판수 ↕</th>
        <th onclick="sortBy('wins')">승 ↕</th>
        <th onclick="sortBy('losses')">패 ↕</th>
        <th onclick="sortBy('rate')">승률 ↕</th>
      </tr>
    </thead>

    <tbody id="ranking"></tbody>
  </table>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://ehligpqxjczgcggjpzwn.supabase.co";
    const SUPABASE_KEY = "sb_publishable_QHDiR1qAWGVaKSDZguc0qg_fE_eVCwZ";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentSort = "rate";
    let ascending = false;
    let playersData = [];

    window.sortBy = function(type) {
      if (currentSort === type) {
        ascending = !ascending;
      } else {
        currentSort = type;
        ascending = false;
      }

      renderTable();
    };

    async function loadRanking() {
      const { data, error } = await supabase
        .from("players")
        .select("lol_name, wins, losses");

      if (error) {
        console.error(error);
        return;
      }

      playersData = data;
      renderTable();
    }

    function renderTable() {
      const data = [...playersData];

      data.sort((a, b) => {
        const gamesA = a.wins + a.losses;
        const gamesB = b.wins + b.losses;

        const rateA = gamesA === 0 ? 0 : a.wins / gamesA;
        const rateB = gamesB === 0 ? 0 : b.wins / gamesB;

        let result = 0;

        if (currentSort === "games") {
          result = gamesA - gamesB;
        } else if (currentSort === "wins") {
          result = a.wins - b.wins;
        } else if (currentSort === "losses") {
          result = a.losses - b.losses;
        } else if (currentSort === "rate") {
          result = rateA - rateB;
        }

        return ascending ? result : -result;
      });

      const tbody = document.getElementById("ranking");
      tbody.innerHTML = "";

      data.forEach((player, index) => {
        const games = player.wins + player.losses;
        const rate = games === 0 ? 0 : (player.wins / games * 100).toFixed(1);

        tbody.innerHTML += `
          <tr>
            <td>${index + 1}</td>
            <td>${player.lol_name}</td>
            <td>${games}</td>
            <td>${player.wins}</td>
            <td>${player.losses}</td>
            <td>${rate}%</td>
          </tr>
        `;
      });
    }

    loadRanking();

    setInterval(loadRanking, 30000);
  </script>
</body>
</html>
