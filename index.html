<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BANDLE.GG</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%237c3aed"/><text x="32" y="27" font-size="20" font-family="Arial" font-weight="900" fill="white" text-anchor="middle">BD</text><text x="32" y="50" font-size="20" font-family="Arial" font-weight="900" fill="white" text-anchor="middle">GG</text></svg>'>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#0F172A;color:white;display:flex;height:100vh}
.hof-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:20px;
}

.hof-name{
    font-size:16px;
    font-weight:800;
    margin-bottom:8px;
}

@media(max-width:1200px){
    .hof-grid{grid-template-columns:repeat(2,1fr)}
}
.sidebar{width:250px;background:#111827;border-right:1px solid #334155;display:flex;flex-direction:column}
.logo{padding:22px;display:flex;align-items:center;gap:12px;font-size:26px;font-weight:900;color:#8B5CF6}
.logo-mark{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#8B5CF6,#4C1D95);display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid #A78BFA;box-shadow:0 0 20px rgba(139,92,246,.35)}
.logo-mark span{line-height:16px;font-size:15px;color:white;font-weight:900}
.menu{display:flex;flex-direction:column;gap:10px;padding:15px}
.menu button{background:none;border:none;color:white;padding:15px;text-align:left;border-radius:12px;cursor:pointer;transition:.2s;font-size:15px}
.menu button:hover{background:#1E293B}
.menu button.active{background:#8B5CF6}
.main{flex:1;overflow:auto}
.header{height:80px;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between;padding:0 30px}
.header button,.back-btn,.sort-btn{background:#8B5CF6;color:white;border:none;border-radius:12px;padding:12px 16px;cursor:pointer;font-weight:700}
.header button:hover,.back-btn:hover,.sort-btn:hover{background:#A78BFA}
.page{display:none;padding:30px}
.page.active{display:block}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.card{background:#1E293B;border-radius:20px;padding:25px;border:1px solid #334155}
.card-title{color:#94A3B8;margin-bottom:10px}
.card-value{font-size:32px;font-weight:700}
.section{margin-top:30px}
.section h2{margin-bottom:15px}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.search-input{background:#111827;color:white;border:1px solid #334155;border-radius:12px;padding:12px 14px;min-width:240px;outline:none}
.search-input:focus{border-color:#8B5CF6}
.sort-btn{background:#1E293B;border:1px solid #334155;padding:12px 14px}
.sort-btn.active{background:#8B5CF6;border-color:#A78BFA}
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.player-card{background:#1E293B;border-radius:20px;padding:20px;transition:.2s;cursor:pointer;border:1px solid #334155}
.player-card:hover{transform:translateY(-4px);border-color:#8B5CF6}
.profile,.big-profile{border-radius:50%;background:#334155;object-fit:cover;display:block}
.profile{width:70px;height:70px;margin-bottom:15px}
.big-profile{width:120px;height:120px;margin-bottom:20px}
.player-name{font-size:20px;font-weight:700;margin-bottom:10px}
.stat{color:#CBD5E1;margin-bottom:4px}
.tier-badge{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:6px 11px;font-size:13px;font-weight:900;margin-bottom:8px;border:1px solid #8B5CF6}
.tier-placement{background:#581C87;color:#E9D5FF;border-color:#A855F7}
.tier-iron{background:#374151;color:#E5E7EB;border-color:#6B7280}
.tier-bronze{background:#78350F;color:#FDBA74;border-color:#B45309}
.tier-silver{background:#334155;color:#E2E8F0;border-color:#94A3B8}
.tier-gold{background:#713F12;color:#FDE68A;border-color:#FACC15}
.tier-platinum{background:#164E63;color:#A5F3FC;border-color:#22D3EE}
.tier-emerald{background:#064E3B;color:#86EFAC;border-color:#22C55E}
.tier-diamond{background:#1E3A8A;color:#BFDBFE;border-color:#60A5FA}
.detail-layout{display:grid;grid-template-columns:360px 1fr;gap:24px;margin-top:20px}
.empty-box{background:#111827;border:1px dashed #475569;color:#94A3B8;border-radius:16px;padding:30px;text-align:center}
.loading{text-align:center;padding:40px}
.champion-list,.match-list{display:flex;flex-direction:column;gap:12px}
.champion-row{background:#111827;border:1px solid #334155;border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:.2s}
.champion-row:hover{border-color:#8B5CF6}
.champion-main{display:flex;flex-direction:column;gap:4px}
.champion-name{font-weight:800;font-size:17px}
.champion-sub{color:#94A3B8;font-size:14px}
.match-row{background:#111827;border:1px solid #334155;border-radius:14px;padding:14px 16px;display:grid;grid-template-columns:80px 1fr 120px 120px 110px 100px;gap:12px;align-items:center;cursor:pointer;transition:.2s}
.match-row:hover{border-color:#8B5CF6}
.result-win{color:#60A5FA;font-weight:900}
.result-lose{color:#F87171;font-weight:900}
.point-plus{color:#4ADE80;font-weight:900}
.point-minus{color:#F87171;font-weight:900}
.badge{display:inline-flex;align-items:center;justify-content:center;background:#312E81;color:#C4B5FD;border:1px solid #8B5CF6;border-radius:999px;padding:5px 10px;font-size:13px;font-weight:800}
.detail-loading{background:#111827;border:1px dashed #475569;color:#94A3B8;border-radius:16px;padding:30px;text-align:center}
.champion-card-title{font-size:22px;font-weight:900;margin-bottom:14px}
.champion-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.champion-stat-box{background:#111827;border:1px solid #334155;border-radius:14px;padding:12px}
.champion-stat-label{color:#94A3B8;font-size:13px;margin-bottom:4px}
.champion-stat-value{font-size:18px;font-weight:900}
.match-card{background:#1E293B;border:1px solid #334155;border-radius:20px;padding:22px;cursor:pointer;transition:.2s}
.match-card:hover{transform:translateY(-4px);border-color:#8B5CF6}
.match-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.match-code{font-size:20px;font-weight:900}
.match-date{color:#94A3B8;font-size:14px}
.score-box{display:flex;align-items:center;justify-content:center;gap:18px;font-size:22px;font-weight:900;margin:18px 0}
.blue{color:#60A5FA}
.red{color:#F87171}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
.team-card{background:#111827;border:1px solid #334155;border-radius:18px;padding:18px}
.team-title{font-size:20px;font-weight:900;margin-bottom:14px}
.record-row{display:grid;grid-template-columns:1fr 90px 90px 90px;gap:10px;padding:10px 0;border-bottom:1px solid #334155;cursor:pointer}
.record-row:hover{background:#1E293B}
.record-row:last-child{border-bottom:none}
</style>
</head>

<body>
<div class="sidebar">
    <div class="logo">
        <div class="logo-mark"><span>BD</span><span>GG</span></div>
        <span>BANDLE.GG</span>
    </div>
    <div class="menu">
        <button class="active" onclick="showPage('home',this)">🏠 홈</button>
        <button onclick="showPage('players',this); renderPlayersView();">👤 플레이어</button>
        <button onclick="showPage('champions',this); loadChampions();">⚔️ 챔피언</button>
        <button onclick="showPage('matches',this); loadMatches();">📜 내전기록</button>
        <button onclick="showPage('recordDisabled',this)">🎯 전적등록</button>
        <button>⚙️ 설정</button>
    </div>
</div>

<div class="main">
<div class="header">
    <h1>BANDLE.GG</h1>
    <button onclick="refreshCurrentPage()">🔄 새로고침</button>
</div>

<div id="home" class="page active">
    <div class="cards">
        <div class="card"><div class="card-title">플레이어</div><div class="card-value" id="playerCount">0</div></div>
        <div class="card"><div class="card-title">총 경기</div><div class="card-value" id="totalGameCount">-</div></div>
        <div class="card"><div class="card-title">이번주 경기</div><div class="card-value" id="weeklyGameCount">-</div></div>
        <div class="card">
            <div class="card-title">📢 밴들 뉴스</div>
            <div style="font-size:14px;line-height:1.8;color:#CBD5E1">
                최근 내전 기록 반영중<br>
                꿀챔 랭킹 업데이트<br>
                명예의 전당 집계중
            </div>
        </div>
    </div>
    <div class="section">
        <h2>🏆 TOP 플레이어</h2>
        <div id="topPlayers" class="player-grid"></div>
    </div>
</div>
<div class="section">
    <h2>🏛️ 명예의 전당</h2>
    <div id="hallOfFame" class="hof-grid"></div>
</div>

<div id="players" class="page">
    <h2 style="margin-bottom:20px;">👤 플레이어 랭킹</h2>
    <div class="toolbar">
        <input class="search-input" id="playerSearch" placeholder="🔍 플레이어 검색" oninput="renderPlayersView()">
        <button class="sort-btn active" data-player-sort="lp" onclick="setPlayerSort('lp',this)">LP</button>
        <button class="sort-btn" data-player-sort="winrate" onclick="setPlayerSort('winrate',this)">승률</button>
        <button class="sort-btn" data-player-sort="games" onclick="setPlayerSort('games',this)">판수</button>
        <button class="sort-btn" data-player-sort="wins" onclick="setPlayerSort('wins',this)">승수</button>
    </div>
    <div id="playersContainer" class="player-grid"><div class="loading">데이터 불러오는 중...</div></div>
</div>

<div id="champions" class="page">
    <h2 style="margin-bottom:20px;">⚔️ 챔피언 통계</h2>
    <div class="toolbar">
      <input class="search-input" id="championSearch" placeholder="🔍 챔피언 검색" oninput="renderChampionsView()">

      <button class="sort-btn active" data-champion-sort="honey" onclick="setChampionSort('honey',this)">🍯 꿀챔</button>

      <button class="sort-btn" data-champion-sort="games" onclick="setChampionSort('games',this)">판수</button>

      <button class="sort-btn" data-champion-sort="winrate" onclick="setChampionSort('winrate',this)">승률</button>

      <button class="sort-btn" data-champion-sort="score" onclick="setChampionSort('score',this)">점수</button>

      <button class="sort-btn active" data-champion-sort="honey" onclick="setChampionSort('honey',this)">🍯 꿀챔</button>
  </div>
    <div id="championsContainer" class="player-grid"><div class="loading">챔피언 데이터 불러오는 중...</div></div>
</div>

<div id="matches" class="page">
    <h2 style="margin-bottom:20px;">📜 내전 기록</h2>
    <div id="matchesContainer" class="player-grid"><div class="loading">내전 기록 불러오는 중...</div></div>
</div>
<div id="recordDisabled" class="page">
    <h2 style="margin-bottom:20px;">🎯 전적등록</h2>

    <div class="card">
        <h2>🚧 준비 중</h2>
        <br>
        <p class="stat">사이트 전적등록 기능은 앱 버전에서 지원 예정입니다.</p>
        <p class="stat">현재는 기존 전적등록기 또는 LCU 자동등록을 사용해주세요.</p>
    </div>
</div>

<div id="matchDetail" class="page">
    <button class="back-btn" onclick="backToMatches()">← 내전 기록</button>
    <div id="matchDetailContent"></div>
</div>

<div id="championDetail" class="page">
    <button class="back-btn" onclick="backToChampions()">← 챔피언 통계</button>
    <div id="championDetailContent"></div>
</div>

<div id="playerDetail" class="page">
    <button class="back-btn" onclick="backToPlayers()">← 플레이어 목록</button>
    <div id="playerDetailContent"></div>
</div>
</div>

<script>
const SUPABASE_URL = "https://ehligpqxjczgcggjpzwn.supabase.co";
const SUPABASE_KEY = "sb_publishable_QHDiR1qAWGVaKSDZguc0qg_fE_eVCwZ";

let db = null;
let playersCache = [];
let matchesCache = [];
let championRecordsCache = [];
let championStatsCache = [];
let playerSortKey = "lp";
let championSortKey = "honey";

if(SUPABASE_URL && SUPABASE_KEY){
    db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
}

function showPage(id,btn){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'));
    if(btn) btn.classList.add('active');
}

function refreshCurrentPage(){
    const activePage = document.querySelector(".page.active");
    if(!activePage) return;
    if(activePage.id === "champions") return loadChampions();
    if(activePage.id === "matches") return loadMatches();
    loadPlayers();
}

async function loadPlayers(){
    if(!db) return;

    const {data,error} = await db.from('bc_players').select('*').order('lp',{ascending:false});
    if(error){console.error(error);return;}

    playersCache = data || [];
    document.getElementById('playerCount').innerText = playersCache.length;

    const validPlayers = playersCache.filter(p=>p.total_games > 0);
    const avgWinrate = validPlayers.length
        ? validPlayers.reduce((sum,p)=>sum + ((p.wins / p.total_games) * 100),0) / validPlayers.length
        : 0;

    document.getElementById('avgWinrate').innerText = avgWinrate.toFixed(1) + "%";
    await loadHomeMatchStats();

    renderPlayersView();
    renderTopPlayers(playersCache);
    renderHallOfFame(playersCache);
}

async function loadHomeMatchStats(){
    const {count,error} = await db.from('bc_matches').select('*',{count:'exact',head:true});
    if(!error && count !== null) document.getElementById('totalGameCount').innerText = count;

    const sevenDaysAgo = new Date();
    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

    const {count:weekCount,error:weekError} = await db
        .from('bc_matches').select('*',{count:'exact',head:true})
        .gte('played_at',sevenDaysAgo.toISOString());

    if(!weekError && weekCount !== null) document.getElementById('weeklyGameCount').innerText = weekCount;
}

function setPlayerSort(key,btn){
    playerSortKey = key;
    document.querySelectorAll("[data-player-sort]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    renderPlayersView();
}

function renderPlayersView(){
    const query = (document.getElementById("playerSearch")?.value || "").toLowerCase().trim();

    let data = [...playersCache].filter(p=>{
        return !query || String(p.nickname || "").toLowerCase().includes(query);
    });

    data.sort((a,b)=>{
        if(playerSortKey === "winrate") return Number(getWinrateRaw(b)) - Number(getWinrateRaw(a));
        if(playerSortKey === "games") return (b.total_games || 0) - (a.total_games || 0);
        if(playerSortKey === "wins") return (b.wins || 0) - (a.wins || 0);
        return getPlayerLP(b) - getPlayerLP(a);
    });

    renderPlayers(data);
}

async function loadChampions(){
    if(!db) return;

    const container = document.getElementById("championsContainer");
    container.innerHTML = `<div class="loading">챔피언 데이터 불러오는 중...</div>`;

    const {data,error} = await db
        .from('bc_champions')
        .select('*')
        .order('honey_score',{ascending:false});

    if(error){
        console.error(error);
        container.innerHTML = `<div class="empty-box">챔피언 데이터를 불러오지 못했습니다.</div>`;
        return;
    }

    championStatsCache = (data || []).map(champ => ({
        champion_name: champ.champion_name,
        games: champ.games || 0,
        wins: champ.wins || 0,
        total_score: Number(champ.total_score || 0),
        total_kp: Number(champ.total_kp || 0),
        bans: champ.bans || 0,
        ban_rate: Number(champ.ban_rate || 0),
        honey_score: Number(champ.honey_score || 0)
    }));

    renderChampionsView();
}

function setChampionSort(key,btn){
    championSortKey = key;
    document.querySelectorAll("[data-champion-sort]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    renderChampionsView();
}

function renderChampionsView(){
    const query = (document.getElementById("championSearch")?.value || "").toLowerCase().trim();

    let data = [...championStatsCache].filter(c=>{
        return !query || String(c.champion_name || "").toLowerCase().includes(query);
    });

    data.sort((a,b)=>{
      if(championSortKey === "winrate") return getChampionWinrate(b) - getChampionWinrate(a);
      if(championSortKey === "score") return getChampionAvgScore(b) - getChampionAvgScore(a);
      if(championSortKey === "kp") return getChampionAvgKP(b) - getChampionAvgKP(a);
      if(championSortKey === "honey") return Number(b.honey_score || 0) - Number(a.honey_score || 0);
      return b.games - a.games;
    });

    renderChampions(data);
}

function buildChampionStats(records){
    const map = {};

    records.forEach(record=>{
        const champ = record.champion_name || "알 수 없음";
        if(!map[champ]){
            map[champ] = {champion_name:champ,games:0,wins:0,kills:0,deaths:0,assists:0,kp:0,score:0,records:[]};
        }

        map[champ].games += 1;
        if(record.result === "win") map[champ].wins += 1;
        map[champ].kills += record.kills || 0;
        map[champ].deaths += record.deaths || 0;
        map[champ].assists += record.assists || 0;
        map[champ].kp += Number(record.kp || 0);
        map[champ].score += Number(record.score || 0);
        map[champ].records.push(record);
    });

    return Object.values(map);
}

async function loadMatches(){
    if(!db) return;
    if(!playersCache.length) await loadPlayers();

    const container = document.getElementById("matchesContainer");
    container.innerHTML = `<div class="loading">내전 기록 불러오는 중...</div>`;

    const {data:matches,error:matchError} = await db
        .from('bc_matches').select('*').order('played_at',{ascending:false});

    if(matchError){
        console.error(matchError);
        container.innerHTML = `<div class="empty-box">내전 기록을 불러오지 못했습니다.</div>`;
        return;
    }

    if(!matches.length){
        container.innerHTML = `<div class="empty-box">아직 내전 기록이 없습니다.</div>`;
        return;
    }

    const matchIds = matches.map(m=>m.id);

    const {data:records,error:recordError} = await db
        .from('bc_records').select('*').in('match_id',matchIds);

    if(recordError){
        console.error(recordError);
        container.innerHTML = `<div class="empty-box">참가자 기록을 불러오지 못했습니다.</div>`;
        return;
    }

    matchesCache = matches.map(match=>({...match,records:(records || []).filter(r=>r.match_id === match.id)}));
    renderMatches(matchesCache);
}

function renderMatches(matches){
    const container = document.getElementById("matchesContainer");

    container.innerHTML = matches.map(match=>{
        const blueRecords = match.records.filter(r=>r.team === "blue");
        const redRecords = match.records.filter(r=>r.team === "red");
        const winnerText = match.winner === "blue" ? "블루 승리" : "레드 승리";
        const winnerClass = match.winner === "blue" ? "blue" : "red";

        return `
            <div class="match-card" onclick="openMatch(${match.id})">
                <div class="match-card-top">
                    <div class="match-code">${escapeHtml(match.match_code || "MATCH-" + match.id)}</div>
                    <div class="match-date">${formatDate(match.played_at)}</div>
                </div>
                <div class="score-box">
                    <span class="blue">BLUE ${match.blue_score ?? 0}</span>
                    <span>:</span>
                    <span class="red">${match.red_score ?? 0} RED</span>
                </div>
                <div class="stat">결과: <span class="${winnerClass}">${winnerText}</span></div>
                <div class="stat">참가자: 블루 ${blueRecords.length}명 / 레드 ${redRecords.length}명</div>
            </div>
        `;
    }).join('');
}

async function openMatchById(id){
    if(!matchesCache.length) await loadMatches();
    openMatch(id);
}

function openMatch(id){
    const match = matchesCache.find(m=>Number(m.id) === Number(id));
    if(!match) return;

    const blueRecords = match.records.filter(r=>r.team === "blue");
    const redRecords = match.records.filter(r=>r.team === "red");

    document.getElementById("matchDetailContent").innerHTML = `
        <div class="section">
            <div class="card">
                <div class="match-card-top">
                    <div>
                        <h1>${escapeHtml(match.match_code || "MATCH-" + match.id)}</h1>
                        <p class="stat">${formatDate(match.played_at)}</p>
                    </div>
                    <div class="badge">${match.winner === "blue" ? "블루 승리" : "레드 승리"}</div>
                </div>
                <div class="score-box">
                    <span class="blue">BLUE ${match.blue_score ?? 0}</span>
                    <span>:</span>
                    <span class="red">${match.red_score ?? 0} RED</span>
                </div>
            </div>

            <div class="team-grid">

            <div class="record-row" onclick="openPlayer(${record.player_id})">

function openChampionDetail(championName){
    const champ = championStatsCache.find(c=>c.champion_name === championName);
    if(!champ) return;

    const playerMap = {};

        const player = playersCache.find(p=>p.id === r.player_id);
        const name = player ? player.nickname : "알 수 없음";
        if(!playerMap[name]) playerMap[name] = {name,games:0,wins:0,kills:0,deaths:0,assists:0,score:0};
        playerMap[name].games++;
        if(r.result === "win") playerMap[name].wins++;
        playerMap[name].kills += r.kills || 0;
        playerMap[name].deaths += r.deaths || 0;
        playerMap[name].assists += r.assists || 0;
        playerMap[name].score += Number(r.score || 0);
    });

    const topPlayers = Object.values(playerMap).sort((a,b)=>b.games-a.games || b.wins-a.wins).slice(0,5);

    document.getElementById("championDetailContent").innerHTML = `
        <div class="detail-layout">
            <div class="card">
                <h1>${escapeHtml(champ.champion_name)}</h1><br>
                <p class="stat">⚔️ ${champ.games}판</p>
                <p class="stat">🏆 ${champ.wins}승 ${champ.games - champ.wins}패</p>
                <p class="stat">📈 승률 ${getChampionWinrate(champ).toFixed(1)}%</p>
                <p class="stat">📊 평균 KP ${getChampionAvgKP(champ).toFixed(1)}%</p>
                <p class="stat">⭐ 평균 점수 ${getChampionAvgScore(champ).toFixed(1)}</p>
            </div>
            <div>
                <div class="card">
                    <h2>TOP 플레이어</h2><br>
                    <div class="champion-list">
                        ${topPlayers.map(p=>`
                            <div class="champion-row">
                                <div class="champion-main">
                                    <div class="champion-name">${escapeHtml(p.name)}</div>
                                    <div class="champion-sub">${p.games}판 · 승률 ${(p.wins/p.games*100).toFixed(1)}%</div>
                                </div>
                                <div class="badge">${(p.kills/p.games).toFixed(1)} / ${(p.deaths/p.games).toFixed(1)} / ${(p.assists/p.games).toFixed(1)}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <br>
                <div class="card">
                    <h2>최근 사용 경기</h2><br>
                    <div class="match-list">
                        ${champ.records.slice(-10).reverse().map(r=>`
                            <div class="match-row" onclick="openMatchById(${r.match_id})">
                                <div class="${r.result === "win" ? "result-win":"result-lose"}">${r.result === "win" ? "승리":"패배"}</div>
                                <div><strong>${escapeHtml(r.lane || "-")}</strong><div class="champion-sub">MATCH-${r.match_id}</div></div>
                                <div>${r.kills||0}/${r.deaths||0}/${r.assists||0}</div>
                                <div>KP ${r.kp ?? 0}%</div>
                                <div>점수 ${r.score ?? 0}</div>
                                <div></div>
                            </div>
                        `).join('')}

    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

function getChampionWinrate(champ){return champ.games ? champ.wins / champ.games * 100 : 0}
function getChampionAvgKP(champ){
    return champ.games ? Number(champ.total_kp || 0) / champ.games : 0;
}

function getChampionAvgScore(champ){
    return champ.games ? Number(champ.total_score || 0) / champ.games : 0;
}

function getWinrateRaw(player){return player.total_games ? (player.wins / player.total_games) * 100 : 0}
function getWinrate(player){return getWinrateRaw(player).toFixed(1)}
function getPlayerLP(player){return Number(player.lp || 0)}

function getTier(player){
    if((player.total_games || 0) < 5) return "배치중!";
    const lp = getPlayerLP(player);
    if(lp >= 2400) return "다이아몬드";
    if(lp >= 2000) return "에메랄드";
    if(lp >= 1600) return "플래티넘";
    if(lp >= 1200) return "골드";
    if(lp >= 800) return "실버";
    if(lp >= 400) return "브론즈";
    return "아이언";
}

function getTierIcon(tier){
    const map={"배치중!":"❓","아이언":"⛓️","브론즈":"🥉","실버":"🥈","골드":"🥇","플래티넘":"💠","에메랄드":"💎","다이아몬드":"🔷"};
    return map[tier] || "🏆";
}

function getTierClass(tier){
    const map={"배치중!":"tier-placement","아이언":"tier-iron","브론즈":"tier-bronze","실버":"tier-silver","골드":"tier-gold","플래티넘":"tier-platinum","에메랄드":"tier-emerald","다이아몬드":"tier-diamond"};
    return map[tier] || "";
}

function getTierBadge(player){
    const tier = getTier(player);
    return `<div class="tier-badge ${getTierClass(tier)}">${getTierIcon(tier)} ${tier}</div>`;
}

function getProfileHtml(player, size="normal"){
    const cls = size === "big" ? "big-profile" : "profile";
    const url = player.profile_image;
    if(url) return `<img class="${cls}" src="${escapeAttribute(url)}" onerror="this.outerHTML='<div class=&quot;${cls}&quot;></div>'">`;
    return `<div class="${cls}"></div>`;
}

function getWinPointChange(player,result){
    const totalGames = player.total_games || 0;
    const wins = player.wins || 0;
    if(totalGames < 5) return result === "win" ? 250 : 40;
    const winrate = totalGames > 0 ? (wins / totalGames) * 100 : 50;
    if(result === "lose") return -15;
    let winPoint = 20;
    if(winrate < 50){
        const dropStep = Math.ceil((50 - winrate) / 5);
        winPoint = 20 - (dropStep * 2);
    }
    return Math.max(winPoint, 4);
}

async function loadPlayerDetail(player){
    const {data,error} = await db
        .from('bc_records')
        .select(`
            *,
            bc_matches(
                match_code,
                played_at
            )
        `)
        .eq('player_id', player.id)
        .order('created_at',{ascending:false})
        .limit(20);

    if(error){
        console.error(error);
        renderPlayerDetailError(player);
        return;
    }

    renderPlayerDetail(player,data || []);
}

function buildMostChampions(records){
    if(!records.length){
        return `<div class="empty-box">아직 전적 데이터가 없습니다.</div>`;
    }

    const map = {};

    records.forEach(record=>{
        const champ = record.champion_name || "알 수 없음";

        if(!map[champ]){
            map[champ] = {
                champion_name: champ,
                games: 0,
                wins: 0,
                kills: 0,
                deaths: 0,
                assists: 0
            };
        }

        map[champ].games += 1;
        if(record.result === "win") map[champ].wins += 1;
        map[champ].kills += record.kills || 0;
        map[champ].deaths += record.deaths || 0;
        map[champ].assists += record.assists || 0;
    });

    const champions = Object.values(map)
        .sort((a,b)=>b.games - a.games)
        .slice(0,5);

    return `
        <div class="champion-list">
            ${champions.map(champ=>{
                const winrate = champ.games ? ((champ.wins / champ.games) * 100).toFixed(1) : "0.0";
                const avgK = (champ.kills / champ.games).toFixed(1);
                const avgD = (champ.deaths / champ.games).toFixed(1);
                const avgA = (champ.assists / champ.games).toFixed(1);

                return `
                    <div class="champion-row" onclick="openChampionDetail('${escapeJs(champ.champion_name)}')">
                        <div class="champion-main">
                            <div class="champion-name">${escapeHtml(champ.champion_name)}</div>
                            <div class="champion-sub">${champ.games}판 · 승률 ${winrate}%</div>
                        </div>
                        <div class="badge">${avgK} / ${avgD} / ${avgA}</div>
                    </div>
                `;
            }).join('')}
        </div>
    `;
}

function buildRecentMatches(player,records){
    if(!records.length){
        return `<div class="empty-box">아직 최근 전적 데이터가 없습니다.</div>`;
    }

    return `
        <div class="match-list">
            ${records.map(record=>{
                const resultClass = record.result === "win" ? "result-win" : "result-lose";
                const resultText = record.result === "win" ? "승리" : "패배";
                const champ = record.champion_name || "알 수 없음";
                const lane = record.lane || "-";
                const score = record.score ?? 0;
                const kp = record.kp ?? 0;
                const matchCode = record.bc_matches?.match_code || "MATCH";

                const pointChange = getWinPointChange(player,record.result);
                const pointClass = pointChange >= 0 ? "point-plus" : "point-minus";
                const pointText = pointChange >= 0 ? `+${pointChange}` : `${pointChange}`;

                return `
                    <div class="match-row" onclick="openMatchById(${record.match_id})">
                        <div class="${resultClass}">${resultText}</div>
                        <div>
                            <strong>${escapeHtml(champ)}</strong>
                            <div class="champion-sub">${escapeHtml(matchCode)} · ${escapeHtml(lane)}</div>
                        </div>
                        <div>${record.kills || 0} / ${record.deaths || 0} / ${record.assists || 0}</div>
                        <div>KP ${kp}%</div>
                        <div>점수 ${score}</div>
                        <div class="${pointClass}">${pointText} LP</div>
                    </div>
                `;
            }).join('')}
        </div>
    `;
}

function formatDate(value){
    if(!value) return "-";

    const date = new Date(value);

    return date.toLocaleString(
        "ko-KR",
        {
            year:"numeric",
            month:"2-digit",
            day:"2-digit",
            hour:"2-digit",
            minute:"2-digit"
        }
    );
}

function escapeHtml(value){
    return String(value ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
}

function escapeAttribute(value){
    return escapeHtml(value).replaceAll("`","&#096;");
}

function escapeJs(value){
    return String(value ?? "")
        .replaceAll("\\","\\\\")
        .replaceAll("'","\\'")
        .replaceAll("\n"," ");
}
