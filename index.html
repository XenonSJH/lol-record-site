    const list=full?original:original.slice(0,MOST_PREVIEW_COUNT);
    if(!original.length){area.innerHTML=mostLaneFilters(playerName)+`<div>모스트 챔피언 데이터가 없습니다.</div>`;return;}
    area.innerHTML=mostLaneFilters(playerName)+`<table class="detail-table"><colgroup><col class="col-rank"><col class="col-champ"><col class="col-small"><col class="col-rate"><col class="col-rate"><col class="col-rate"><col class="col-rate"><col class="col-rate"><col class="col-rate"><col class="col-score"></colgroup><thead><tr><th>순위</th><th><button class="sort-btn" onclick="sortMost('name','${safe(playerName)}')">챔피언</button></th><th><button class="sort-btn" onclick="sortMost('games','${safe(playerName)}')">판수</button></th><th><button class="sort-btn" onclick="sortMost('winRate','${safe(playerName)}')">승률</button></th><th><button class="sort-btn" onclick="sortMost('avgKills','${safe(playerName)}')">평균 킬</button></th><th><button class="sort-btn" onclick="sortMost('avgDeaths','${safe(playerName)}')">평균 데스</button></th><th><button class="sort-btn" onclick="sortMost('avgAssists','${safe(playerName)}')">평균 어시</button></th><th><button class="sort-btn" onclick="sortMost('kda','${safe(playerName)}')">KDA</button></th><th><button class="sort-btn" onclick="sortMost('kp','${safe(playerName)}')">킬관여율</button></th><th><button class="sort-btn" onclick="sortMost('score','${safe(playerName)}')">점수</button></th></tr></thead><tbody>${list.map((c,i)=>`<tr><td>${rankText(i+1)}</td><td style="text-align:left"><div class="champ-cell" title="${htmlSafe(c.champion)}"><img class="champ-icon" src="${champImg(c.champion)}" onerror="this.style.display='none'"/><span class="champ-lane-icon">${laneIcon(c.lane)}</span><span class="champ-name">${htmlSafe(c.champion)}</span></div></td><td>${c.games}</td><td class="${rateClass(c.winRate)}">${pct(c.winRate)}</td><td>${c.avgKills.toFixed(1)}</td><td>${c.avgDeaths.toFixed(1)}</td><td>${c.avgAssists.toFixed(1)}</td><td>${c.kda.toFixed(2)}</td><td>${pct(c.kp)}</td><td>${c.score.toFixed(1)}</td></tr>`).join('')}</tbody></table>`;
    wrapTable(area);
  };

  toggleSmartSection=function(id){
    const sec=document.getElementById(id);
    if(!sec)return;
    sec.classList.toggle('smart-full-view');
    document.body.classList.remove('smart-full-active');
    setButton(sec);
    if(id==='mostChampionSection')renderMostChampionArea(sec.dataset.smartName);
    else if(id==='championRecentMatchSection')renderChampionRecentMatchArea(sec.dataset.smartName);
    else renderRecentMatchArea(sec.dataset.smartName);
    const d=detailBox();
    const top=Math.max(0,sec.offsetTop-84);
    requestAnimationFrame(()=>{if(d&&d.style.display!=='none')d.scrollTo({top,behavior:'smooth'});else window.scrollTo({top,behavior:'smooth'});});
  };
  toggleCollapsible=function(id){
    if(isSmart(id))return toggleSmartSection(id);
    const s=document.getElementById(id);
    if(!s)return;
    s.classList.toggle('open');
    const b=s.querySelector('.collapse-toggle');
    if(b){const o=s.classList.contains('open');b.innerHTML=`${o?'접기':'펼치기'} <span class="collapse-arrow">⌄</span>`;}
  };

  setRecentLane=function(lane,playerName){
    recentLane=lane;
    const sec=document.getElementById('recentMatchSection');
    if(sec){const c=sec.querySelector('.collapsible-content');if(c)c.innerHTML=recentControls(playerName);}
    renderRecentMatchArea(playerName);
  };
  setChampionRecentLane=function(lane,championName){
    recentLane=lane;
    const sec=document.getElementById('championRecentMatchSection');
    if(sec){const c=sec.querySelector('.collapsible-content');if(c)c.innerHTML=championRecentControls(championName);}
    renderChampionRecentMatchArea(championName);
  };
  runRecentSearch=function(target,value){
    recentChampionSearch=(value||'').trim();
    const i=document.getElementById('recentSearchInput');
    if(i)i.value=recentChampionSearch;
    const b=document.getElementById('recentSuggestBox');
    if(b){b.style.display='none';b.innerHTML='';}
    if(document.getElementById('championRecentMatchArea'))renderChampionRecentMatchArea(target);
    else renderRecentMatchArea(target);
  };
  setMostLane=function(lane,playerName){mostLane=lane;renderMostChampionArea(playerName);};
  sortMost=function(type,playerName){
    if(mostSort===type)mostAsc=!mostAsc;
    else{mostSort=type;mostAsc=type==='name';}
    renderMostChampionArea(playerName);
  };

  function cleanSynergyTitles(){
    [...document.querySelectorAll('#detailContent .section-title')].forEach(title=>{
      const t=title.textContent.replace(/\s+/g,' ').trim();
      if(t.startsWith('최고의 듀오')){title.textContent='최고의 듀오';title.parentElement?.classList.add('synergy-clean-title');}
      if(t.startsWith('같이 조합되면 좋은 챔피언')){title.textContent='같이 조합되면 좋은 챔피언';title.parentElement?.classList.add('synergy-clean-title');}
    });
  }

  window.__makeToc=function(){
    const old=document.getElementById('tocOrbWrap');
    if(old)old.remove();
    const wrap=document.createElement('div');
    wrap.id='tocOrbWrap';
    wrap.className='toc-orb-wrap show';
    wrap.innerHTML=`<div class="toc-panel" id="tocPanel"></div><button class="toc-orb" type="button" title="목차">☰</button>`;
    document.body.appendChild(wrap);
    const orb=wrap.querySelector('.toc-orb');
    const panel=wrap.querySelector('#tocPanel');
    const detail=detailBox();
    let closeTimer=null;
    const open=()=>{clearTimeout(closeTimer);wrap.classList.add('open');};
    const closeSoon=()=>{clearTimeout(closeTimer);closeTimer=setTimeout(()=>wrap.classList.remove('open'),420);};
    orb.addEventListener('mouseenter',open);
    orb.addEventListener('mouseleave',closeSoon);
    panel.addEventListener('mouseenter',open);
    panel.addEventListener('mouseleave',closeSoon);
    orb.addEventListener('click',(e)=>{e.stopPropagation();wrap.classList.toggle('open');});
    document.addEventListener('click',(e)=>{if(!wrap.contains(e.target))wrap.classList.remove('open');});
    const sections=[...document.querySelectorAll('#detailContent .section')].map((sec,i)=>({sec,title:(sec.querySelector('.section-title')?.textContent||`항목 ${i+1}`).replace(/\s+/g,' ').trim()}));
    panel.innerHTML=sections.map((x,i)=>`<button class="toc-item" type="button" data-toc="${i}">${htmlSafe(x.title)}</button>`).join('');
    [...panel.querySelectorAll('.toc-item')].forEach(btn=>btn.onclick=(e)=>{
      e.stopPropagation();
      const target=sections[Number(btn.dataset.toc)]?.sec;
      if(!target)return;
      const top=Math.max(0,target.offsetTop-86);
      if(detail&&detail.style.display!=='none')detail.scrollTo({top,behavior:'smooth'});
      else window.scrollTo({top:Math.max(0,(window.scrollY||0)+target.getBoundingClientRect().top-86),behavior:'smooth'});
      wrap.classList.remove('open');
    });
  };

  const __v9ShowDetail=showDetail;
  showDetail=function(html){
    __v9ShowDetail(html);
    setTimeout(()=>{
      document.body.classList.remove('smart-full-active');
      cleanSynergyTitles();
      SMART_IDS.forEach(id=>{const sec=document.getElementById(id);if(sec){sec.classList.remove('smart-full-view');setButton(sec);}});
      window.__makeToc?.();
    },580);
  };

  const __v9GoBack=goBack;
  goBack=function(){document.body.classList.remove('smart-full-active');document.getElementById('tocOrbWrap')?.remove();__v9GoBack();};

  window.toggleSmartSection=toggleSmartSection;
  window.toggleCollapsible=toggleCollapsible;
  window.renderRecentMatchArea=renderRecentMatchArea;
  window.renderChampionRecentMatchArea=renderChampionRecentMatchArea;
  window.renderMostChampionArea=renderMostChampionArea;
  window.setRecentLane=setRecentLane;
  window.setChampionRecentLane=setChampionRecentLane;
  window.runRecentSearch=runRecentSearch;
  window.setMostLane=setMostLane;
  window.sortMost=sortMost;
  window.goBack=goBack;
})();

loadData();setInterval(loadData,30000);
</script>
</body>
</html>
