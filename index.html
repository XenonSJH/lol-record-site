<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BANDLE.GG</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0F172A;
    color:white;
    display:flex;
    height:100vh;
}

.sidebar{
    width:250px;
    background:#111827;
    border-right:1px solid #334155;
    display:flex;
    flex-direction:column;
}

.logo{
    padding:25px;
    font-size:28px;
    font-weight:700;
    color:#8B5CF6;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:10px;
    padding:15px;
}

.menu button{
    background:none;
    border:none;
    color:white;
    padding:15px;
    text-align:left;
    border-radius:12px;
    cursor:pointer;
    transition:.2s;
    font-size:15px;
}

.menu button:hover{
    background:#1E293B;
}

.menu button.active{
    background:#8B5CF6;
}

.main{
    flex:1;
    overflow:auto;
}

.header{
    height:80px;
    border-bottom:1px solid #334155;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
}

.page{
    display:none;
    padding:30px;
}

.page.active{
    display:block;
}

.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.card{
    background:#1E293B;
    border-radius:20px;
    padding:25px;
}

.card-title{
    color:#94A3B8;
    margin-bottom:10px;
}

.card-value{
    font-size:32px;
    font-weight:700;
}

.section{
    margin-top:30px;
}

.section h2{
    margin-bottom:15px;
}

.player-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
}

.player-card{
    background:#1E293B;
    border-radius:20px;
    padding:20px;
    transition:.2s;
}

.player-card:hover{
    transform:translateY(-4px);
}

.profile{
    width:70px;
    height:70px;
    border-radius:50%;
    background:#334155;
    margin-bottom:15px;
}

.player-name{
    font-size:20px;
    font-weight:700;
    margin-bottom:10px;
}

.stat{
    color:#CBD5E1;
    margin-bottom:4px;
}

.loading{
    text-align:center;
    padding:40px;
}
</style>
</head>
<body>

<div class="sidebar">

<div class="logo">
BANDLE.GG
</div>

<div class="menu">
<button class="active" onclick="showPage('home',this)">🏠 홈</button>
<button onclick="showPage('players',this)">👤 플레이어</button>
<button>⚔️ 챔피언</button>
<button>📜 내전기록</button>
<button>🎯 전적등록</button>
<button>⚙️ 설정</button>
</div>

</div>

<div class="main">

<div class="header">
<h1>BANDLE.GG</h1>
<button onclick="loadPlayers()">
🔄 새로고침
</button>
</div>

<!-- HOME -->

<div id="home" class="page active">

<div class="cards">

<div class="card">
<div class="card-title">플레이어</div>
<div class="card-value" id="playerCount">0</div>
</div>

<div class="card">
<div class="card-title">총 경기</div>
<div class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">이번주 경기</div>
<div class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">평균 승률</div>
<div class="card-value">-</div>
</div>

</div>

<div class="section">
<h2>🏆 TOP 플레이어</h2>

<div id="topPlayers" class="player-grid"></div>
</div>

</div>

<!-- PLAYERS -->

<div id="players" class="page">

<h2 style="margin-bottom:20px;">
👤 플레이어 랭킹
</h2>

<div id="playersContainer" class="player-grid">

<div class="loading">
데이터 불러오는 중...
</div>

</div>

</div>

</div>

<script>

/*
===================================
SUPABASE 정보 입력
===================================
*/

const SUPABASE_URL = "https://ehligpqxjczgcggjpzwn.supabase.co";

const SUPABASE_KEY = "sb_publishable_QHDiR1qAWGVaKSDZguc0qg_fE_eVCwZ";

let db = null;

if(
SUPABASE_URL !== "여기에_URL"
){
    db =
    window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
    );
}

function showPage(id,btn){

document.querySelectorAll('.page')
.forEach(p=>p.classList.remove('active'));

document.getElementById(id)
.classList.add('active');

document.querySelectorAll('.menu button')
.forEach(b=>b.classList.remove('active'));

btn.classList.add('active');
}

async function loadPlayers(){

if(!db){
return;
}

const {data,error}
=
await db
.from('bc_players')
.select('*')
.order('carry_score',
{
ascending:false
});

if(error){
console.error(error);
return;
}

document.getElementById(
'playerCount'
).innerText = data.length;

renderPlayers(data);
renderTopPlayers(data);
}

function renderTopPlayers(data){

const top =
data.slice(0,3);

const container =
document.getElementById(
'topPlayers'
);

container.innerHTML = '';

top.forEach(player=>{

const winrate =
player.total_games
?
(
player.wins /
player.total_games
*100
).toFixed(1)
:0;

container.innerHTML += `
<div class="player-card">

<div class="player-name">
${player.nickname}
</div>

<div class="stat">
승률 ${winrate}%
</div>

<div class="stat">
캐리점수 ${player.carry_score}
</div>

</div>
`;

});
}

function renderPlayers(data){

const container =
document.getElementById(
'playersContainer'
);

container.innerHTML='';

data.forEach(player=>{

const winrate =
player.total_games
?
(
player.wins /
player.total_games
*100
).toFixed(1)
:0;

container.innerHTML += `

<div class="player-card">

<div class="profile"></div>

<div class="player-name">
${player.nickname}
</div>

<div class="stat">
${player.total_games}전
</div>

<div class="stat">
${player.wins}승
${player.losses}패
</div>

<div class="stat">
승률 ${winrate}%
</div>

<div class="stat">
캐리점수 ${player.carry_score}
</div>

</div>

`;

});

}

loadPlayers();

</script>

</body>
</html>
