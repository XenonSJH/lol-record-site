<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내전 전적표</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, #2563eb 0%, transparent 32%),
        linear-gradient(135deg, #020617, #111827);
      color: white;
      padding: 40px;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      font-size: 42px;
      margin-bottom: 12px;
    }

    .summary {
      text-align: center;
      margin-bottom: 24px;
      color: #cbd5e1;
      font-size: 18px;
    }

    .search-box {
      width: 100%;
      padding: 15px;
      margin-bottom: 24px;
      border-radius: 14px;
      border: 1px solid #334155;
      background: rgba(15, 23, 42, 0.9);
      color: white;
      font-size: 16px;
      outline: none;
    }

    .search-box:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.25);
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 10px;
    }

    th {
      padding: 16px;
      background: rgba(30, 41, 59, 0.95);
      color: #93c5fd;
      cursor: pointer;
      user-select: none;
    }

    td {
      padding: 16px;
      text-align: center;
      background: rgba(31, 41, 55, 0.95);
      border-bottom: 1px solid rgba(55, 65, 81, 0.8);
    }

    th:first-child,
    td:first-child {
      border-radius: 14px 0 0 14px;
    }

    th:last-child,
    td:last-child {
      border-radius: 0 14px 14px 0;
    }

    tbody tr {
      transition: 0.15s;
    }

    tbody tr:hover {
      transform: scale(1.01);
    }

    tbody tr:hover td {
      background: #273449;
    }

    .nickname {
      font-weight: 700;
    }

    .win {
      color: #22c55e;
      font-weight: 700;
    }

    .loss {
      color: #ef4444;
      font-weight: 700;
    }

    .rate-high {
      color: #22c55e;
      font-weight: 800;
    }

    .rate-mid {
      color: #facc15;
      font-weight: 800;
    }

    .rate-low {
      color: #f87171;
      font-weight: 800;
    }

    .rank-1 td:first-child,
    .rank-2 td:first-child,
    .rank-3 td:first-child {
      font-size: 20px;
      font-weight: 800;
    }

    @media (max-width: 700px) {
      body { padding: 20px; }
      h1 { font-size: 32px; }

      th,
      td {
        padding: 10px 6px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <h1>🏆 내전 전적 랭킹</h1>
  <div class="summary" id="summary">총 판수 계산 중...</div>

  <input
    id="searchInput"
    class="search-box"
    type="text"
    placeholder="닉네임 검색..."
    oninput="renderTable()"
  />

  <table>
    <thead>
      <tr>
        <th>순위</th>
        <th onclick="sortBy('name')">닉네임 ↕</th>
        <th onclick="sortBy('games')">판수 ↕</th>
        <th onclick="sortBy('wins')">승 ↕</th>
        <th onclick="sortBy('losses')">패 ↕</th>
        <th onclick="sortBy('rate')">승률 ↕</th>
        <th onclick="sortBy('participation')">참여율 ↕</th>
      </tr>
    </thead>

    <tbody id="ranking"></tbody>
  </table>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://ehligpqxjczgcggjpzwn.supabase.co";
    const SUPABASE_KEY = "sb_publishable_QHDiR1qAWGVaKSDZguc0qg_fE_eVCwZ";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentSort = "rate";
    let ascending = false;
    let playersData = [];
    let totalGames = 0;

    window.sortBy = function(type) {
      if (currentSort === type) {
        ascending = !ascending;
      } else {
        currentSort = type;
        ascending = false;
      }

      renderTable();
    };

    window.renderTable = renderTable;

    async function loadRanking() {
      const { data, error } = await supabase
        .from("players")
        .select("lol_name, wins, losses");

      if (error) {
        console.error(error);
        document.getElementById("summary").innerText = "데이터를 불러오지 못했습니다.";
        return;
      }

      playersData = data || [];


      const totalPlayerGames = playersData.reduce((sum, player) => {
        return sum + player.wins + player.losses;
      }, 0);

      totalGames = totalPlayerGames / 10;

      document.getElementById("summary").innerText =
      `총 판수: ${totalGames.toFixed(0)}판 ㅣ 멤버 수: ${playersData.length}명`;

      renderTable();
    }

    function getLanguageGroup(name) {
      const first = name.trim()[0];

      if (!first) return 4;
      if (/[가-힣]/.test(first)) return 1;
      if (/[a-zA-Z]/.test(first)) return 2;
      if (/[\u4e00-\u9fff]/.test(first)) return 3;

      return 4;
    }

    function compareNames(aName, bName) {
      const groupA = getLanguageGroup(aName);
      const groupB = getLanguageGroup(bName);

      if (groupA !== groupB) return groupA - groupB;
      if (groupA === 1) return aName.localeCompare(bName, "ko");
      if (groupA === 2) return aName.localeCompare(bName, "en");
      if (groupA === 3) return aName.localeCompare(bName, "zh");

      return aName.localeCompare(bName);
    }

    function renderTable() {
      const keyword = document
        .getElementById("searchInput")
        .value
        .toLowerCase();

      const data = playersData.filter(player =>
        player.lol_name.toLowerCase().includes(keyword)
      );

      data.sort((a, b) => {
        const gamesA = a.wins + a.losses;
        const gamesB = b.wins + b.losses;

        const rateA = gamesA === 0 ? 0 : a.wins / gamesA;
        const rateB = gamesB === 0 ? 0 : b.wins / gamesB;

        const participationA = totalGames === 0 ? 0 : gamesA / totalGames;
        const participationB = totalGames === 0 ? 0 : gamesB / totalGames;

        let result = 0;

        if (currentSort === "name") result = compareNames(a.lol_name, b.lol_name);
        else if (currentSort === "games") result = gamesA - gamesB;
        else if (currentSort === "wins") result = a.wins - b.wins;
        else if (currentSort === "losses") result = a.losses - b.losses;
        else if (currentSort === "rate") result = rateA - rateB;
        else if (currentSort === "participation") result = participationA - participationB;

        return ascending ? result : -result;
      });

      const tbody = document.getElementById("ranking");
      tbody.innerHTML = "";

      data.forEach((player, index) => {
        const games = player.wins + player.losses;
        const rateNumber = games === 0 ? 0 : (player.wins / games) * 100;
        const rate = rateNumber.toFixed(1);

        const participationNumber =
          totalGames === 0 ? 0 : (games / totalGames) * 100;

        const participation = participationNumber.toFixed(1);

        const realRank = ascending
          ? data.length - index
          : index + 1;

        const rankText =
          realRank === 1 ? "🥇" :
          realRank === 2 ? "🥈" :
          realRank === 3 ? "🥉" :
          realRank;

        const rankClass =
          realRank === 1 ? "rank-1" :
          realRank === 2 ? "rank-2" :
          realRank === 3 ? "rank-3" :
          "";

        const rateClass =
          rateNumber >= 60 ? "rate-high" :
          rateNumber >= 50 ? "rate-mid" :
          "rate-low";

        tbody.innerHTML += `
          <tr class="${rankClass}">
            <td>${rankText}</td>
            <td class="nickname">${player.lol_name}</td>
            <td>${games}</td>
            <td class="win">${player.wins}</td>
            <td class="loss">${player.losses}</td>
            <td class="${rateClass}">${rate}%</td>
            <td>${participation}%</td>
          </tr>
        `;
      });
    }

    loadRanking();
    setInterval(loadRanking, 30000);
  </script>
</body>
</html>
