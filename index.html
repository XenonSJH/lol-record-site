<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>내전 전적</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      padding: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1f2937;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 14px;
      text-align: center;
      border-bottom: 1px solid #374151;
    }

    th {
      background: #374151;
    }

    tr:hover {
      background: #2d3748;
    }
  </style>
</head>
<body>
  <h1>내전 전적표</h1>

  <table>
    <thead>
      <tr>
        <th>순위</th>
        <th>닉네임</th>
        <th>판수</th>
        <th>승</th>
        <th>패</th>
        <th>승률</th>
      </tr>
    </thead>
    <tbody id="ranking"></tbody>
  </table>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://ehligpqxjczgcggjpzwn.supabase.co";
    const SUPABASE_KEY = "sb_publishable_QHDiR1qAWGVaKSDZguc0qg_fE_eVCwZ";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadRanking() {
      const { data, error } = await supabase
        .from("players")
        .select("lol_name, wins, losses");

      if (error) {
        console.error(error);
        return;
      }

      data.sort((a, b) => {
        const aGames = a.wins + a.losses;
        const bGames = b.wins + b.losses;

        const aRate = aGames === 0 ? 0 : a.wins / aGames;
        const bRate = bGames === 0 ? 0 : b.wins / bGames;

        if (bRate !== aRate) return bRate - aRate;
        return b.wins - a.wins;
      });

      const tbody = document.getElementById("ranking");
      tbody.innerHTML = "";

      data.forEach((player, index) => {
        const games = player.wins + player.losses;
        const rate = games === 0 ? 0 : (player.wins / games * 100).toFixed(1);

        tbody.innerHTML += `
          <tr>
            <td>${index + 1}</td>
            <td>${player.lol_name}</td>
            <td>${games}</td>
            <td>${player.wins}</td>
            <td>${player.losses}</td>
            <td>${rate}%</td>
          </tr>
        `;
      });
    }

    loadRanking();
  </script>
</body>
</html>
<script>
setInterval(() => {
    location.reload();
}, 30000);
</script>
