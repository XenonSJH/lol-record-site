<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🏆 BANDLE.GG 🏆</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at left, rgba(15,23,42,.55), transparent 28%),
    radial-gradient(circle at right, rgba(15,23,42,.55), transparent 28%),
    linear-gradient(90deg, #111827, #1e293b 18%, #1e293b 82%, #111827);
  color: white;
  padding: 40px;
  min-height: 100vh;
}

h1 {
  text-align: center;
  font-size: 42px;
  margin-bottom: 12px;
}

.summary {
  text-align: center;
  margin-bottom: 24px;
  color: #cbd5e1;
  font-size: 18px;
}

.tab-container {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 24px;
}

.tab {
  padding: 12px 32px;
  border-radius: 14px;
  border: none;
  color: white;
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
  transition: .2s;
  background: #4b5563;
  filter: grayscale(100%);
}

.tab.active {
  background: #dc2626;
  filter: grayscale(0%);
}

.search-box {
  width: 100%;
  padding: 15px;
  margin-bottom: 24px;
  border-radius: 14px;
  border: 1px solid #334155;
  background: rgba(30,41,59,.95);
  color: white;
  font-size: 16px;
  outline: none;
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 10px;
  table-layout: fixed;
}

th {
  padding: 15px 8px;
  background: rgba(51,65,85,.95);
  color: #93c5fd;
  cursor: pointer;
  user-select: none;
  text-align: center;
}

td {
  padding: 15px 8px;
  text-align: center;
  background: rgba(51,65,85,.88);
  border-bottom: 1px solid rgba(71,85,105,.55);
  vertical-align: middle;
}

th:first-child,
td:first-child {
  border-radius: 14px 0 0 14px;
}

th:last-child,
td:last-child {
  border-radius: 0 14px 14px 0;
}

tbody tr:hover td {
  background: rgba(71,85,105,.95);
}

.nickname {
  font-weight: 800;
}

.clickable-row {
  cursor: pointer;
}

.win {
  color: #22c55e;
  font-weight: 800;
}

.loss {
  color: #ef4444;
  font-weight: 800;
}

.rate-high {
  color: #22c55e;
  font-weight: 900;
}

.rate-mid {
  color: #facc15;
  font-weight: 900;
}

.rate-low {
  color: #f87171;
  font-weight: 900;
}

.tier-badge {
  width: 68px;
  height: 42px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-weight: 900;
  font-size: 20px;
}

.tier-s { color:#ef4444; border:2px solid #ef4444; box-shadow:0 0 10px #ef4444; }
.tier-a { color:#f97316; border:2px solid #f97316; box-shadow:0 0 10px #f97316; }
.tier-b { color:#facc15; border:2px solid #facc15; box-shadow:0 0 10px #facc15; }
.tier-c { color:#22c55e; border:2px solid #22c55e; box-shadow:0 0 10px #22c55e; }
.tier-d { color:#3b82f6; border:2px solid #3b82f6; box-shadow:0 0 10px #3b82f6; }

.champ-cell {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.champ-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  border: 1px solid #334155;
  object-fit: cover;
  flex-shrink: 0;
}

.champ-name {
  font-weight: 900;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.detail-row td {
  background: transparent !important;
  padding: 0 !important;
  border-bottom: none !important;
}

.detail-wrap {
  overflow: hidden;
  max-height: 1000px;
  opacity: 1;
  transform: translateY(0);
  transition: max-height .28s ease, opacity .22s ease, transform .22s ease;
}

.detail-wrap.opening {
  animation: slideDown .28s ease-out;
}

.detail-wrap.closing {
  max-height: 0;
  opacity: 0;
  transform: translateY(-8px);
}

.detail-wrap.no-animate {
  animation: none !important;
  transition: none !important;
}

@keyframes slideDown {
  from {
    opacity: 0;
    max-height: 0;
    transform: translateY(-8px);
  }
  to {
    opacity: 1;
    max-height: 1000px;
    transform: translateY(0);
  }
}

.detail-box {
  margin: 4px 0 14px 0;
  background: rgba(15,23,42,.92);
  border: 1px solid rgba(96,165,250,.35);
  border-radius: 18px;
  padding: 18px;
}

.detail-title {
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 14px;
  color: #bfdbfe;
}

.detail-table {
  border-spacing: 0 8px;
}

.detail-table th {
  font-size: 13px;
  padding: 10px;
  background: rgba(30,41,59,.95);
}

.detail-table td {
  font-size: 14px;
  padding: 10px;
  background: rgba(51,65,85,.82);
}

.detail-table th:first-child {
  cursor: default;
}

.group-divider td {
  height: 20px;
  padding: 0;
  background: transparent !important;
  border-bottom: 2px solid rgba(147,197,253,.5);
  border-radius: 0 !important;
}

.low-participation td {
  color: #cbd5e1 !important;
  filter: grayscale(70%);
}

#championPage {
  display: none;
}

#championPage th:nth-child(1), #championPage td:nth-child(1) { width: 7%; }
#championPage th:nth-child(2), #championPage td:nth-child(2) { width: 8%; }
#championPage th:nth-child(3), #championPage td:nth-child(3) { width: 20%; text-align: left; }
#championPage th:nth-child(4), #championPage td:nth-child(4) { width: 7%; }
#championPage th:nth-child(5), #championPage td:nth-child(5) { width: 7%; }
#championPage th:nth-child(6), #championPage td:nth-child(6) { width: 7%; }
#championPage th:nth-child(7), #championPage td:nth-child(7) { width: 8%; }
#championPage th:nth-child(8), #championPage td:nth-child(8) { width: 8%; }
#championPage th:nth-child(9), #championPage td:nth-child(9) { width: 12%; }
#championPage th:nth-child(10), #championPage td:nth-child(10) { width: 8%; }
#championPage th:nth-child(11), #championPage td:nth-child(11) { width: 8%; }

@media (max-width: 800px) {
  body { padding: 20px; }
  h1 { font-size: 30px; }
  th, td { padding: 9px 5px; font-size: 12px; }
  .champ-icon { width: 34px; height: 34px; }
  .tier-badge { width: 48px; height: 32px; font-size: 15px; }
}
</style>
</head>

<body>
<h1>🏆 벤들시티 내전 통계 🏆</h1>

<div class="tab-container">
  <button id="playerBtn" class="tab active">플레이어</button>
  <button id="championBtn" class="tab">챔피언</button>
</div>

<div class="summary" id="summary">총 판수 계산 중...</div>

<div id="playerPage">
  <input id="searchInput" class="search-box" type="text" placeholder="닉네임 검색..." oninput="renderPlayerTable()" />

  <table>
    <thead>
      <tr>
        <th>순위</th>
        <th onclick="sortBy('name')">닉네임 ↕</th>
        <th onclick="sortBy('games')">판수 ↕</th>
        <th onclick="sortBy('wins')">승 ↕</th>
        <th onclick="sortBy('losses')">패 ↕</th>
        <th onclick="sortBy('rate')">승률 ↕</th>
        <th onclick="sortBy('participation')">참여율 ↕</th>
      </tr>
    </thead>
    <tbody id="ranking"></tbody>
  </table>
</div>

<div id="championPage">
  <input id="championSearchInput" class="search-box" type="text" placeholder="챔피언 검색..." oninput="renderChampionTable()" />

  <table>
    <thead>
      <tr>
        <th onclick="sortChampionBy('rank')">순위 ↕</th>
        <th onclick="sortChampionBy('tier')">티어 ↕</th>
        <th onclick="sortChampionBy('name')">챔피언 ↕</th>
        <th onclick="sortChampionBy('games')">판수 ↕</th>
        <th onclick="sortChampionBy('wins')">승 ↕</th>
        <th onclick="sortChampionBy('losses')">패 ↕</th>
        <th onclick="sortChampionBy('winRate')">승률 ↕</th>
        <th onclick="sortChampionBy('pickRate')">픽률 ↕</th>
        <th onclick="sortChampionBy('kdaText')">K/D/A ↕</th>
        <th onclick="sortChampionBy('kda')">KDA ↕</th>
        <th onclick="sortChampionBy('score')">점수 ↕</th>
      </tr>
    </thead>
    <tbody id="championRanking"></tbody>
  </table>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL = "https://ehligpqxjczgcggjpzwn.supabase.co";
const SUPABASE_KEY = "sb_publishable_QHDiR1qAWGVaKSDZguc0qg_fE_eVCwZ";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentSort = "rate";
let ascending = false;

let championSort = "score";
let championAscending = false;

let masterSort = "score";
let masterAscending = false;

let playerChampSort = "score";
let playerChampAscending = false;

let selectedChampion = null;
let selectedPlayer = null;

let detailOpenMode = null;
let suppressDetailAnimation = false;

let playersData = [];
let championData = [];
let totalGames = 0;

let latestVersion = "15.12.1";
let championNameToId = {};

const playerBtn = document.getElementById("playerBtn");
const championBtn = document.getElementById("championBtn");
const playerPage = document.getElementById("playerPage");
const championPage = document.getElementById("championPage");

playerBtn.onclick = () => {
  playerPage.style.display = "block";
  championPage.style.display = "none";
  playerBtn.classList.add("active");
  championBtn.classList.remove("active");
  renderPlayerTable();
};

championBtn.onclick = () => {
  playerPage.style.display = "none";
  championPage.style.display = "block";
  championBtn.classList.add("active");
  playerBtn.classList.remove("active");
  renderChampionTable();
};

window.sortBy = function(type) {
  if (currentSort === type) ascending = !ascending;
  else {
    currentSort = type;
    ascending = type === "name";
  }

  suppressDetailAnimation = true;
  renderPlayerTable();
};

window.sortChampionBy = function(type) {
  if (championSort === type) championAscending = !championAscending;
  else {
    championSort = type;
    championAscending = type === "name";
  }

  suppressDetailAnimation = true;
  renderChampionTable();
};

window.sortMasterBy = function(type) {
  if (masterSort === type) masterAscending = !masterAscending;
  else {
    masterSort = type === "rank" ? "score" : type;
    masterAscending = type === "name";
  }

  suppressDetailAnimation = true;
  renderChampionTable();
};

window.sortPlayerChampBy = function(type) {
  if (playerChampSort === type) playerChampAscending = !playerChampAscending;
  else {
    playerChampSort = type === "rank" ? "score" : type;
    playerChampAscending = type === "name";
  }

  suppressDetailAnimation = true;
  renderPlayerTable();
};

window.toggleChampion = function(name) {
  if (selectedChampion === name) {
    closeDetailThen(() => {
      selectedChampion = null;
      detailOpenMode = null;
      renderChampionTable();
    });
    return;
  }

  selectedChampion = name;
  selectedPlayer = null;
  detailOpenMode = "champion";
  suppressDetailAnimation = false;
  renderChampionTable();
};

window.togglePlayer = function(name) {
  if (selectedPlayer === name) {
    closeDetailThen(() => {
      selectedPlayer = null;
      detailOpenMode = null;
      renderPlayerTable();
    });
    return;
  }

  selectedPlayer = name;
  selectedChampion = null;
  detailOpenMode = "player";
  suppressDetailAnimation = false;
  renderPlayerTable();
};

window.renderPlayerTable = renderPlayerTable;
window.renderChampionTable = renderChampionTable;

function closeDetailThen(callback) {
  const wrap = document.querySelector(".detail-wrap");

  if (!wrap) {
    callback();
    return;
  }

  wrap.classList.add("closing");

  setTimeout(callback, 260);
}

function detailWrapClass(mode) {
  if (suppressDetailAnimation) {
    return "detail-wrap no-animate";
  }

  if (detailOpenMode === mode) {
    return "detail-wrap opening";
  }

  return "detail-wrap";
}

async function loadChampionMeta() {
  try {
    const versionRes = await fetch("https://ddragon.leagueoflegends.com/api/versions.json");
    const versions = await versionRes.json();
    latestVersion = versions[0];

    const champRes = await fetch(`https://ddragon.leagueoflegends.com/cdn/${latestVersion}/data/ko_KR/champion.json`);
    const champJson = await champRes.json();

    championNameToId = {};
    Object.values(champJson.data).forEach(champ => {
      championNameToId[champ.name] = champ.id;
    });
  } catch (e) {
    console.error("챔피언 메타 로드 실패:", e);
  }
}

function getChampionImageUrl(championName) {
  const champId = championNameToId[championName];
  if (!champId) return "";
  return `https://ddragon.leagueoflegends.com/cdn/${latestVersion}/img/champion/${champId}.png`;
}

async function loadRanking() {
  await loadChampionMeta();

  const { data, error } = await supabase
    .from("players")
    .select("lol_name, wins, losses");

  if (error) {
    document.getElementById("summary").innerText = "데이터를 불러오지 못했습니다.";
    return;
  }

  const { count: matchCount } = await supabase
    .from("matches")
    .select("*", { count: "exact", head: true });

  const { data: champRows } = await supabase
    .from("match_players")
    .select("champion_name, lol_name, kills, deaths, assists, win");

  playersData = data || [];
  championData = champRows || [];
  totalGames = matchCount || 0;

  document.getElementById("summary").innerText =
    `총 판수: ${totalGames}판 ㅣ 멤버 수: ${playersData.length}명`;

  suppressDetailAnimation = true;
  renderPlayerTable();
  renderChampionTable();
}

function getLanguageGroup(name) {
  const first = name.trim()[0];
  if (!first) return 4;
  if (/[가-힣]/.test(first)) return 1;
  if (/[a-zA-Z]/.test(first)) return 2;
  if (/[\u4e00-\u9fff]/.test(first)) return 3;
  return 4;
}

function compareNames(aName, bName) {
  const groupA = getLanguageGroup(aName);
  const groupB = getLanguageGroup(bName);
  if (groupA !== groupB) return groupA - groupB;
  if (groupA === 1) return aName.localeCompare(bName, "ko");
  if (groupA === 2) return aName.localeCompare(bName, "en");
  if (groupA === 3) return aName.localeCompare(bName, "zh");
  return aName.localeCompare(bName);
}

function getStats(player) {
  const wins = Number(player.wins) || 0;
  const losses = Number(player.losses) || 0;
  const games = wins + losses;
  const rateNumber = games === 0 ? 0 : wins / games * 100;
  const participationNumber = totalGames === 0 ? 0 : games / totalGames * 100;
  return { wins, losses, games, rateNumber, participationNumber };
}

function getParticipationGroup(p) {
  if (p >= 35) return 0;
  if (p >= 10) return 1;
  return 2;
}

function getKda(k, d, a) {
  return d === 0 ? k + a : (k + a) / d;
}

function getChampionTier(score) {
  if (score >= 85) return "S";
  if (score >= 70) return "A";
  if (score >= 55) return "B";
  if (score >= 40) return "C";
  return "D";
}

function getTierClass(tier) {
  if (tier === "S") return "tier-s";
  if (tier === "A") return "tier-a";
  if (tier === "B") return "tier-b";
  if (tier === "C") return "tier-c";
  return "tier-d";
}

function rateClass(rate) {
  if (rate >= 60) return "rate-high";
  if (rate >= 50) return "rate-mid";
  return "rate-low";
}

function buildPersonalChampScore(item) {
  const winRate = item.games === 0 ? 0 : item.wins / item.games * 100;
  const avgKills = item.games === 0 ? 0 : item.kills / item.games;
  const avgDeaths = item.games === 0 ? 0 : item.deaths / item.games;
  const avgAssists = item.games === 0 ? 0 : item.assists / item.games;
  const kda = getKda(item.kills, item.deaths, item.assists);

  const playScore = Math.min(item.games / 25, 1) * 18;
  const winScore = winRate * 0.42;
  const kdaScore = Math.min(kda / 6, 1) * 22;
  const killScore = Math.min(avgKills / 10, 1) * 8;

  return {
    ...item,
    winRate,
    avgKills,
    avgDeaths,
    avgAssists,
    kda,
    score: playScore + winScore + kdaScore + killScore
  };
}

function renderPlayerTable() {
  const keyword = document.getElementById("searchInput").value.toLowerCase();

  const data = playersData.filter(player =>
    player.lol_name.toLowerCase().includes(keyword)
  );

  data.sort((a,b) => {
    const A = getStats(a);
    const B = getStats(b);

    if (currentSort === "rate") {
      const gA = getParticipationGroup(A.participationNumber);
      const gB = getParticipationGroup(B.participationNumber);

      if (!ascending) {
        if (gA !== gB) return gA - gB;
        return B.rateNumber - A.rateNumber;
      } else {
        if (gA !== gB) return gB - gA;
        return A.rateNumber - B.rateNumber;
      }
    }

    let result = 0;

    if (currentSort === "name") result = compareNames(a.lol_name, b.lol_name);
    else if (currentSort === "games") result = A.games - B.games;
    else if (currentSort === "wins") result = A.wins - B.wins;
    else if (currentSort === "losses") result = A.losses - B.losses;
    else if (currentSort === "participation") result = A.participationNumber - B.participationNumber;

    return ascending ? result : -result;
  });

  const tbody = document.getElementById("ranking");
  tbody.innerHTML = "";

  let lastGroup = null;
  let rankedCount = 0;

  data.forEach((player, index) => {
    const { wins, losses, games, rateNumber, participationNumber } = getStats(player);
    const currentGroup = getParticipationGroup(participationNumber);
    const isRanked = participationNumber >= 35;

    if (currentSort === "rate" && lastGroup !== null && lastGroup !== currentGroup) {
      tbody.innerHTML += `<tr class="group-divider"><td colspan="7"></td></tr>`;
    }

    lastGroup = currentGroup;

    let realRank;

    if (currentSort === "rate") {
      if (isRanked) {
        rankedCount++;
        realRank = ascending
          ? data.filter(p => getStats(p).participationNumber >= 35).length - rankedCount + 1
          : rankedCount;
      } else {
        realRank = "-";
      }
    } else {
      realRank = currentSort === "name"
        ? ascending ? index + 1 : data.length - index
        : ascending ? data.length - index : index + 1;
    }

    const rankText =
      realRank === 1 ? "🥇" :
      realRank === 2 ? "🥈" :
      realRank === 3 ? "🥉" :
      realRank;

    const safeName = player.lol_name.replaceAll("'", "\\'");

    tbody.innerHTML += `
      <tr class="clickable-row ${participationNumber < 10 ? "low-participation" : ""}" onclick="togglePlayer('${safeName}')">
        <td>${rankText}</td>
        <td class="nickname">${player.lol_name}</td>
        <td>${games}</td>
        <td class="win">${wins}</td>
        <td class="loss">${losses}</td>
        <td class="${rateClass(rateNumber)}">${rateNumber.toFixed(1)}%</td>
        <td>${participationNumber.toFixed(1)}%</td>
      </tr>
    `;

    if (selectedPlayer === player.lol_name) {
      tbody.innerHTML += renderPlayerChampionRanking(player.lol_name);
    }
  });

  suppressDetailAnimation = false;
}

function getChampionStats() {
  const map = {};

  championData.forEach(row => {
    const champ = row.champion_name;
    if (!champ) return;

    if (!map[champ]) {
      map[champ] = {
        name: champ,
        wins: 0,
        losses: 0,
        kills: 0,
        deaths: 0,
        assists: 0
      };
    }

    if (row.win) map[champ].wins++;
    else map[champ].losses++;

    map[champ].kills += Number(row.kills) || 0;
    map[champ].deaths += Number(row.deaths) || 0;
    map[champ].assists += Number(row.assists) || 0;
  });

  return Object.values(map).map(champ => {
    const games = champ.wins + champ.losses;
    const winRate = games === 0 ? 0 : champ.wins / games * 100;
    const pickRate = totalGames === 0 ? 0 : games / totalGames * 100;

    const avgKills = games === 0 ? 0 : champ.kills / games;
    const avgDeaths = games === 0 ? 0 : champ.deaths / games;
    const avgAssists = games === 0 ? 0 : champ.assists / games;
    const kda = getKda(champ.kills, champ.deaths, champ.assists);

    const winRateScore = winRate * 0.42;
    const pickRateScore = Math.min(pickRate / 35, 1) * 23;
    const gamesScore = Math.min(games / 20, 1) * 15;
    const kdaScore = Math.min(kda / 6, 1) * 20;

    const score = winRateScore + pickRateScore + gamesScore + kdaScore;

    return {
      ...champ,
      games,
      winRate,
      pickRate,
      avgKills,
      avgDeaths,
      avgAssists,
      kda,
      score,
      tier: getChampionTier(score)
    };
  });
}

function compareChampion(a,b) {
  let result = 0;

  if (championSort === "rank" || championSort === "score") result = a.score - b.score;
  else if (championSort === "tier") {
    const order = { S:5, A:4, B:3, C:2, D:1 };
    result = order[a.tier] - order[b.tier];
  }
  else if (championSort === "name") result = compareNames(a.name,b.name);
  else if (championSort === "games") result = a.games - b.games;
  else if (championSort === "wins") result = a.wins - b.wins;
  else if (championSort === "losses") result = a.losses - b.losses;
  else if (championSort === "winRate") result = a.winRate - b.winRate;
  else if (championSort === "pickRate") result = a.pickRate - b.pickRate;
  else if (championSort === "kdaText") result = a.avgKills - b.avgKills;
  else if (championSort === "kda") result = a.kda - b.kda;

  return championAscending ? result : -result;
}

function getMasterStats(championName) {
  const map = {};

  championData.filter(row => row.champion_name === championName).forEach(row => {
    const name = row.lol_name || "알 수 없음";

    if (!map[name]) {
      map[name] = {
        name,
        games:0,
        wins:0,
        losses:0,
        kills:0,
        deaths:0,
        assists:0
      };
    }

    map[name].games++;

    if (row.win) map[name].wins++;
    else map[name].losses++;

    map[name].kills += Number(row.kills) || 0;
    map[name].deaths += Number(row.deaths) || 0;
    map[name].assists += Number(row.assists) || 0;
  });

  return Object.values(map).map(p => buildPersonalChampScore(p));
}

function getPlayerChampionStats(playerName) {
  const map = {};

  championData.filter(row => row.lol_name === playerName).forEach(row => {
    const champ = row.champion_name || "알 수 없음";

    if (!map[champ]) {
      map[champ] = {
        name: champ,
        games:0,
        wins:0,
        losses:0,
        kills:0,
        deaths:0,
        assists:0
      };
    }

    map[champ].games++;

    if (row.win) map[champ].wins++;
    else map[champ].losses++;

    map[champ].kills += Number(row.kills) || 0;
    map[champ].deaths += Number(row.deaths) || 0;
    map[champ].assists += Number(row.assists) || 0;
  });

  return Object.values(map).map(c => buildPersonalChampScore(c));
}

function compareMaster(a,b) {
  let result = 0;

  if (masterSort === "name") result = compareNames(a.name,b.name);
  else if (masterSort === "games") result = a.games - b.games;
  else if (masterSort === "winRate") result = a.winRate - b.winRate;
  else if (masterSort === "kdaText") result = a.avgKills - b.avgKills;
  else if (masterSort === "kda") result = a.kda - b.kda;
  else result = a.score - b.score;

  return masterAscending ? result : -result;
}

function comparePlayerChamp(a,b) {
  let result = 0;

  if (playerChampSort === "name") result = compareNames(a.name,b.name);
  else if (playerChampSort === "games") result = a.games - b.games;
  else if (playerChampSort === "winRate") result = a.winRate - b.winRate;
  else if (playerChampSort === "kdaText") result = a.avgKills - b.avgKills;
  else if (playerChampSort === "kda") result = a.kda - b.kda;
  else result = a.score - b.score;

  return playerChampAscending ? result : -result;
}

function renderMasterRanking(championName) {
  let masters = getMasterStats(championName);
  masters.sort(compareMaster);

  let html = `
    <tr class="detail-row">
      <td colspan="11">

            <table class="detail-table">

                <tr>

                  <th onclick="sortMasterBy('winRate')">승률 ↕</th>
                  <th onclick="sortMasterBy('kdaText')">K/D/A ↕</th>
                  <th onclick="sortMasterBy('kda')">KDA ↕</th>
                  <th onclick="sortMasterBy('score')">점수 ↕</th>

  `;

  masters.forEach((m, index) => {

function renderPlayerChampionRanking(playerName) {
  let champs = getPlayerChampionStats(playerName);
  champs.sort(comparePlayerChamp);

  let html = `
    <tr class="detail-row">
      <td colspan="7">

  champs.forEach((c, index) => {

  html += `

function renderChampionTable() {
  const keyword = document.getElementById("championSearchInput").value.toLowerCase();

  let champions = getChampionStats().filter(champ =>
    champ.name.toLowerCase().includes(keyword)
  );

  champions.sort(compareChampion);

  const tbody = document.getElementById("championRanking");
  tbody.innerHTML = "";

  if (champions.length === 0) {
    tbody.innerHTML = `<tr><td colspan="11">아직 챔피언 통계 데이터가 없습니다.</td></tr>`;
    return;
  }

  champions.forEach((champ, index) => {
    const displayRank = championAscending ? champions.length - index : index + 1;

    const rankText =
      displayRank === 1 ? "🥇" :
      displayRank === 2 ? "🥈" :
      displayRank === 3 ? "🥉" :
      displayRank;

    const imageUrl = getChampionImageUrl(champ.name);
    const safeName = champ.name.replaceAll("'", "\\'");

    tbody.innerHTML += `
      <tr class="clickable-row" onclick="toggleChampion('${safeName}')">
        <td>${rankText}</td>
        <td><div class="tier-badge ${getTierClass(champ.tier)}">${champ.tier}</div></td>
        <td>
          <div class="champ-cell">
            <img class="champ-icon" src="${imageUrl}" onerror="this.style.display='none'" />
            <span class="champ-name">${champ.name}</span>
          </div>
        </td>
        <td>${champ.games}</td>
        <td class="win">${champ.wins}</td>
        <td class="loss">${champ.losses}</td>
        <td>${champ.winRate.toFixed(1)}%</td>
        <td>${champ.pickRate.toFixed(1)}%</td>
        <td>${champ.avgKills.toFixed(1)} / ${champ.avgDeaths.toFixed(1)} / ${champ.avgAssists.toFixed(1)}</td>
        <td>${champ.kda.toFixed(2)}</td>
        <td>${champ.score.toFixed(1)}</td>
      </tr>
    `;

    if (selectedChampion === champ.name) {
      tbody.innerHTML += renderMasterRanking(champ.name);
    }
  });

  suppressDetailAnimation = false;
}
